<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace;">
    <h3>Probing android.webview Property...</h3>
    <div id="log">Checking types...</div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerHTML += "<br>" + msg; }

        function probe() {
            if (!window.android) {
                log("[!] android object missing");
                return;
            }

            let wv = window.android.webview;
            log("[*] Type of android.webview: " + typeof wv);

            if (typeof wv === 'object' && wv !== null) {
                log("<span style='color:red;'>[!!!] DATA OBJECT DETECTED</span>");
                for (let prop in wv) {
                    try {
                        log(` -> .${prop} (Type: ${typeof wv[prop]})`);
                    } catch(e) {
                        log(` -> .${prop} (ACCESS DENIED)`);
                    }
                }
            } else {
                log("[*] Attempting to access as getter...");
                try {
                    log("[*] Value: " + wv);
                } catch(e) {
                    log("[!] Error reading property: " + e);
                }
            }
        }
        setTimeout(probe, 1000);
    </script>
</body>
</html>
