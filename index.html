<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSI Recon</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 10px; }
        textarea { width: 100%; height: 80vh; background: #000; color: #0f0; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <h3>Scanning for Injected Interfaces...</h3>
    <textarea id="out"></textarea>

    <script>
        let out = document.getElementById('out');
        let foundInterfaces = [];
        
        // Step 1: Scan the window object for custom injected objects
        for (let prop in window) {
            try {
                if (typeof window[prop] === 'object' && window[prop] !== null) {
                    // Filter for likely Facebook/System objects
                    let p = prop.toLowerCase();
                    if (p.includes('fb') || p.includes('facebook') || 
                        p.includes('android') || p.includes('secure') || 
                        p.includes('helium') || p.includes('messenger')) {
                        foundInterfaces.push(prop);
                    }
                }
            } catch(e) {
                // Ignore cross-origin frame errors
            }
        }

        out.value += "=== FOUND OBJECTS ===\n" + foundInterfaces.join('\n') + "\n\n";

        // Step 2: Brute-force read the methods on those objects
        foundInterfaces.forEach(iface => {
            out.value += `--- window.${iface} ---\n`;
            try {
                let obj = window[iface];
                let methods = Object.getOwnPropertyNames(obj);
                
                // Sometimes they are hidden in the prototype
                if (methods.length === 0) {
                    methods = Object.getOwnPropertyNames(Object.getPrototypeOf(obj));
                }

                methods.forEach(m => {
                    if (typeof obj[m] === 'function') {
                        out.value += `  ${m}()\n`;
                    } else {
                        out.value += `  ${m} (Property)\n`;
                    }
                });
            } catch(e) {
                out.value += `  [Locked/Unreadable]\n`;
            }
            out.value += "\n";
        });
        
        if(foundInterfaces.length === 0) {
            out.value += "No obvious custom interfaces found. They might be hidden behind window.webkit or requires a specific FB domain.";
        }
    </script>
</body>
</html>
