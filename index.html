<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="1" height="1"></canvas>
<script>
const gl = document.getElementById('c').getContext('webgl2', {
  powerPreference: 'high-performance',
  preserveDrawingBuffer: true
});
if (!gl) throw new Error('WebGL2 not supported');

const maxSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
const texSize = Math.min(maxSize, 4096); // 64 MB textures

// Rapidly allocate and free huge textures
function stress() {
  for (let i = 0; i < 50; i++) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texSize, texSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    gl.deleteTexture(tex);
  }
  // Keep the GPU pipeline busy (forces command buffer processing)
  gl.clear(gl.COLOR_BUFFER_BIT);
}

// Run stress loop every 1ms
setInterval(stress, 1);
</script>
</body>
</html>
