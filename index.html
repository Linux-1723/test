<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace;">
    <h3>Extracting Bridge Methods...</h3>
    <div id="out"></div>

    <script>
        const out = document.getElementById('out');
        const targets = ['android', '_AutofillMessageHandler', '_PromoExtensions', 'navigationPerformanceLoggerJavascriptInterface', 'browserDeclutter'];

        targets.forEach(t => {
            try {
                let obj = window[t];
                if (obj) {
                    out.innerHTML += `<br><b>Target: ${t}</b><br>`;
                    // Enumerate all properties, including non-enumerable Java methods
                    let methods = Object.getOwnPropertyNames(Object.getPrototypeOf(obj));
                    methods.forEach(m => {
                        out.innerHTML += ` - ${m}()<br>`;
                    });
                }
            } catch(e) {
                out.innerHTML += `<br>Error accessing ${t}: ${e}<br>`;
            }
        });
    </script>
</body>
</html>
