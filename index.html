<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Crash Catcher</title>
</head>
<body>
    <h2>Capturing the SIGTRAP Payload</h2>
    <button id="fuzzBtn">START</button>
    <pre id="lastShader" style="background:#222; color:#0f0; padding:10px; font-family:monospace;"></pre>

    <script>
        const logEl = document.getElementById('lastShader');

        // Generate deeply nested math
        function generateDeepMath(depth) {
            if (depth <= 0) return "(1.0)";
            return `(${generateDeepMath(depth - 1)} + vec4<f32>(1.0).x)`;
        }

        // Generate deeply nested control flow
        function generateDeepControlFlow(depth) {
            if (depth <= 0) return `return vec4<f32>(1.0);`;
            return `if (true) { loop { if (false) { break; } ${generateDeepControlFlow(depth - 1)} } } else { ${generateDeepControlFlow(depth - 1)} }`;
        }

        function generateEvilShader() {
            // We use extreme depths to trigger the SIGTRAP again
            const body = Math.random() > 0.5 
                ? generateDeepControlFlow(80) 
                : `let x = ${generateDeepMath(150)}; return vec4<f32>(x);`;
                
            return `@vertex fn vs_main() -> @builtin(position) vec4<f32> {\n${body}\nreturn vec4<f32>(1.0);\n}`;
        }

        async function runFuzzer() {
            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            setInterval(() => {
                const evilWGSL = generateEvilShader();
                
                // SAVE THE SHADER TO THE SCREEN BEFORE COMPILING
                logEl.innerText = "If Chrome crashes now, copy this shader!\n\n" + evilWGSL;

                try {
                    device.createShaderModule({ code: evilWGSL });
                } catch (e) {}
            }, 100); // Slower so the screen has time to update
        }

        document.getElementById('fuzzBtn').addEventListener('click', runFuzzer);
    </script>
</body>
</html>
