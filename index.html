<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>
<script>
(async function() {
  const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };
  // Try many different canvas sizes and context creation attributes
  for (let w = 1; w <= 16384; w *= 2) {
    for (let h = 1; h <= 16384; h *= 2) {
      const attributes = [
        {powerPreference: 'high-performance'},
        {powerPreference: 'low-power'},
        {desynchronized: true},
        {preserveDrawingBuffer: true},
        {failIfMajorPerformanceCaveat: false},
        {xrCompatible: true}
      ];
      for (const attr of attributes) {
        try {
          const canvas = new OffscreenCanvas(w, h);
          const gl = canvas.getContext('webgl2', attr);
          if (!gl) continue;
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.flush();
          log(`Created ${w}x${h} with ${JSON.stringify(attr)}`);
          // Quick destroy to trigger channel teardown and recreation
          canvas.width = 0;
        } catch(e) {}
      }
    }
  }
  log('All combinations tried – check logcat');
})();
</script>
</body>
</html>
