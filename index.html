<!DOCTYPE html>
<html>
<head><title>Find Interface Provider Handle</title></head>
<body>
<h1>Searching for browser interface provider...</h1>
<pre id="log"></pre>
<script>
(async () => {
    const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

    // Check common places where the browser interface provider might be exposed.
    const candidates = [
        { obj: window, name: 'window.mojo' },
        { obj: window.mojo, name: 'window.mojo.internal' },
        { obj: window.mojo?.internal, name: 'window.mojo.internal.interfaceProvider' },
        { obj: window, name: 'window.interfaceProvider' },
        { obj: navigator, name: 'navigator.mojo' },
        { obj: Mojo, name: 'Mojo.interfaceProvider' },
        { obj: Mojo, name: 'Mojo.internal' },
    ];

    for (const c of candidates) {
        try {
            const val = c.obj ? (c.name.split('.').reduce((o,i)=>o?.[i], window) ?? 'undefined') : 'N/A';
            log(`${c.name}: ${typeof val} ${val && typeof val === 'object' ? Object.keys(val).join(', ') : ''}`);
            if (val && typeof val === 'object' && val.type === 'MojoHandle') {
                log(`✅ Found handle: ${c.name}`);
                // Try to bind InstalledAppProvider with this handle
                try {
                    const handle = Mojo.bindInterface('blink.mojom.InstalledAppProvider', val);
                    log('✅ SUCCESS: Bound InstalledAppProvider using the handle!');
                } catch(e) {
                    log(`Bind attempt: ${e.message}`);
                }
            }
        } catch (e) {}
    }

    // Also list all properties of Mojo itself
    log('\nProperties of Mojo:');
    for (const key of Object.keys(Mojo)) {
        log(`  ${key}: ${typeof Mojo[key]}`);
    }
})();
</script>
</body>
</html>
