<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>
<script>
(async function() {
  const log = (msg) => document.getElementById('log').textContent += msg + '\n';
  log('Starting Skia fuzzer...');

  // Generate random PNG-like data (this is not valid PNG, but Chrome's decoder may still try)
  function randomBytes(length) {
    const arr = new Uint8Array(length);
    for (let i = 0; i < length; i++) arr[i] = Math.floor(Math.random() * 256);
    return arr;
  }

  async function testRandomImage() {
    const size = Math.floor(Math.random() * 100000) + 1000; // 1 KB to 100 KB
    const data = randomBytes(size);
    const blob = new Blob([data], {type: 'image/png'});
    try {
      const bitmap = await createImageBitmap(blob);
      const canvas = new OffscreenCanvas(bitmap.width, bitmap.height);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      return true;
    } catch(e) {
      return false;
    }
  }

  // Run many iterations
  for (let i = 0; i < 500; i++) {
    if (i % 50 === 0) log(`Iteration ${i}`);
    await testRandomImage();
  }
  log('Fuzzer finished – check logcat for crashes');
})();
</script>
</body>
</html>
