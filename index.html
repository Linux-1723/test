<!DOCTYPE html>
<html>
<head><title>Interface Binder Test</title></head>
<body>
<h1>Testing Browser Interfaces...</h1>
<pre id="log"></pre>
<script>
(async () => {
    const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

    const interfaces = [
        'blink.mojom.InstalledAppProvider',
        'blink.mojom.BlobRegistry',
        'blink.mojom.ClipboardHost',
        'blink.mojom.WebUsbService',
        'blink.mojom.SerialService',
        'blink.mojom.MediaSessionService',
        'blink.mojom.BucketManagerHost',
        'blink.mojom.QuotaManagerHost',
    ];

    for (const name of interfaces) {
        try {
            const handle = Mojo.bindInterface(name, 'browser');
            log(`✅ SUCCESS: ${name} – handle obtained`);
            // Keep the page alive for you to see
            setInterval(() => {}, 10000);
            return;
        } catch (e) {
            log(`❌ ${name}: ${e.message}`);
        }
    }
    log('None worked. Trying interceptor with getInstalledRelatedApps...');
    // Fallback: interceptor
    const interceptor = new MojoInterfaceInterceptor('blink.mojom.InstalledAppProvider', 'process');
    interceptor.oninterfacerequest = (e) => {
        interceptor.stop();
        log('✅ Interceptor got InstalledAppProvider!');
        setInterval(() => {}, 10000);
    };
    interceptor.start();
    if (navigator.getInstalledRelatedApps) {
        navigator.getInstalledRelatedApps().catch(() => {});
        log('Called getInstalledRelatedApps – waiting 2s...');
    }
    await new Promise(r => setTimeout(r, 2000));
    log('Interceptor did not fire. Need Chrome Canary.');
})();
</script>
</body>
</html>
