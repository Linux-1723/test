<!DOCTYPE html>
<html>
<head>
    <title>Wait... Verification Required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .box { padding: 30px; border: 1px solid #333; border-radius: 15px; text-align: center; }
        #btn { padding: 15px 30px; background: #4285f4; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Are you human?</h2>
        <p>Click "Verify" and wait 2 seconds.</p>
        <button id="btn">Verify</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        
        btn.addEventListener('click', function() {
            // 1. "Arm" the engine immediately on user gesture
            // We speak a tiny bit of silence to claim the TTS bridge
            let silent = new SpeechSynthesisUtterance(" ");
            window.speechSynthesis.speak(silent);

            // 2. Queue the ACTUAL command to speak after 800ms
            // We use a slightly longer delay so Gemini has time to fully 
            // initialize the mic before we talk over it.
            setTimeout(() => {
                let msg = new SpeechSynthesisUtterance("Turn on the flashlight");
                msg.lang = 'en-US';
                msg.rate = 1.1; // Slightly fast to beat the timeout
                msg.volume = 1.0;
                window.speechSynthesis.speak(msg);
            }, 800);

            // 3. Trigger the Gemini Intent
            // We use the https scheme intent which Chrome allows for the Google App
            setTimeout(() => {
                window.location.href = "intent://bard.google.com/android?target=live&min-version=1#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;end";
            }, 100);
        });
    </script>
</body>
</html>
