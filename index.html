<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<script>
(async function() {
  const offscreen = new OffscreenCanvas(4096, 4096);
  const gl = offscreen.getContext('webgl2', {
    powerPreference: 'high-performance',
    failIfMajorPerformanceCaveat: false
  });
  if (!gl) {
    document.body.innerHTML += '<p>WebGL2 not supported</p>';
    return;
  }

  const maxTexSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
  const bigSize = Math.min(maxTexSize, 16384);

  // Allocate several huge textures to really stress the system
  for (let i = 0; i < 5; i++) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, bigSize, bigSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    const fb = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    const rb = gl.createRenderbuffer();
    gl.bindRenderbuffer(gl.RENDERBUFFER, rb);
    gl.renderbufferStorage(gl.RENDERBUFFER, gl.RGBA8, bigSize, bigSize);
    gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.RENDERBUFFER, rb);
    const buf = new Uint8Array(4);
    gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, buf);
  }

  console.log('Allocated ' + 5 + ' huge textures of size ' + bigSize + 'x' + bigSize);
})();
</script>
</body>
</html>
