<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meta JS Bridge Dumper</title>
    <style>body { font-family: monospace; word-wrap: break-word; }</style>
</head>
<body>
    <h3>Hunting for JS Bridges...</h3>
    <div id="output"></div>

    <script>
        function log(msg) {
            document.getElementById('output').innerHTML += msg + "<br><br>";
        }

        window.onload = function() {
            setTimeout(() => {
                let keys = Object.getOwnPropertyNames(window);
                
                // Look for anything injected that looks like a bridge
                let suspiciousKeys = keys.filter(k => 
                    k.toLowerCase().includes('biz') || 
                    k.toLowerCase().includes('fb') || 
                    k.toLowerCase().includes('facebook') || 
                    k.toLowerCase().includes('extension') ||
                    k.toLowerCase().includes('android') ||
                    k === '_fbBatchedBridge' ||
                    k === 'prompt' // Sometimes they override window.prompt for message passing
                );
                
                if (suspiciousKeys.length > 0) {
                    log("<b>🚨 FOUND POTENTIAL BRIDGES:</b><br>" + suspiciousKeys.join("<br>"));
                    
                    // Try to dump the methods of the first interesting one
                    suspiciousKeys.forEach(key => {
                        try {
                            let obj = window[key];
                            if (typeof obj === 'object') {
                                log(`<b>Methods in ${key}:</b><br>` + Object.keys(obj).join(", "));
                            }
                        } catch(e) {}
                    });

                } else {
                    log("No obvious bridges found. Dumping all window keys for manual inspection:");
                    log(keys.join(", "));
                }
            }, 1000); // 1 second delay to ensure WebView finishes injection
        };
    </script>
</body>
</html>
