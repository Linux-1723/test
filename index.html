<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Deep Dump</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

        :root {
            --bg: #0a0c0f;
            --panel: #0e1117;
            --border: #1c2a1c;
            --green: #00ff88;
            --green-dim: #00cc66;
            --green-faint: rgba(0,255,136,0.07);
            --amber: #ffcc00;
            --red: #ff4466;
            --text: #b0c8b0;
            --muted: #3a4a3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none;
            z-index: 999;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(0,255,136,0.5);
        }

        .status-bar { display: flex; gap: 12px; margin-left: auto; font-size: 11px; }

        .badge {
            padding: 3px 10px;
            border: 1px solid;
            border-radius: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badge-idle  { border-color: var(--muted); color: var(--muted); }
        .badge-run   { border-color: var(--amber); color: var(--amber); animation: blink 1s step-end infinite; }
        .badge-done  { border-color: var(--green); color: var(--green); }
        .badge-error { border-color: var(--red); color: var(--red); }

        @keyframes blink { 50% { opacity: 0.3; } }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            padding: 7px 18px;
            background: transparent;
            border: 1px solid var(--green-dim);
            color: var(--green);
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.15s, box-shadow 0.15s;
        }
        button:hover { background: var(--green-faint); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        button:active { opacity: 0.7; }
        button.danger { border-color: var(--red); color: var(--red); }
        button.danger:hover { background: rgba(255,68,102,0.07); box-shadow: 0 0 10px rgba(255,68,102,0.2); }
        button.method-btn {
            font-size: 11px;
            padding: 4px 12px;
            border-color: #334;
            color: #66ccff;
            margin: 3px 3px 3px 0;
        }
        button.method-btn:hover { background: rgba(102,204,255,0.07); box-shadow: 0 0 8px rgba(102,204,255,0.2); }

        .depth-label { color: var(--muted); font-size: 11px; margin-left: 8px; }
        input[type=range] { accent-color: var(--green); width: 80px; cursor: pointer; }
        #depth-val { color: var(--green); min-width: 12px; display: inline-block; }

        .split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: rgba(0,255,136,0.04);
            border-bottom: 1px solid var(--border);
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--green-dim);
        }

        .entry-count { color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 11px; }

        .log-box {
            height: 280px;
            overflow-y: auto;
            padding: 10px 14px;
            scroll-behavior: smooth;
        }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-track { background: transparent; }
        .log-box::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

        .methods-box {
            padding: 8px 14px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }
        .methods-label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .log-line {
            padding: 2px 0;
            line-height: 1.6;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }

        .log-line.fn   { color: #66ccff; }
        .log-line.res  { color: var(--green); padding-left: 18px; }
        .log-line.prop { color: var(--text); }
        .log-line.info { color: var(--amber); }
        .log-line.err  { color: var(--red); }
        .log-line.none { color: var(--muted); font-style: italic; }
        .log-line.call { color: #cc88ff; }

        .prefix { color: var(--muted); user-select: none; }

        .full-panel { margin-top: 12px; }
        .full-panel .log-box { height: 180px; }

        .timer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 11px;
            color: var(--muted);
        }
        #countdown { color: var(--amber); font-family: 'Orbitron', monospace; min-width: 24px; }
        .progress-bar { flex: 1; height: 3px; background: var(--muted); border-radius: 2px; overflow: hidden; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green-dim), var(--green));
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 6px rgba(0,255,136,0.5);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">ENV_DUMP</div>
    <div style="color:var(--muted);font-size:11px;letter-spacing:1px;">BROWSER · ANDROID · AUTOFILL INSPECTOR</div>
    <div class="status-bar">
        <span id="status-badge" class="badge badge-idle">IDLE</span>
    </div>
</header>

<div class="controls">
    <button onclick="runDump()">▶ RUN NOW</button>
    <button onclick="clearAll()" class="danger">✕ CLEAR</button>
    <button onclick="copyResults()">⎘ COPY ALL</button>
    <span class="depth-label">
        DEPTH: <span id="depth-val">2</span>
        <input type="range" min="0" max="5" value="2"
               oninput="document.getElementById('depth-val').textContent=this.value; maxDepth=+this.value;"
               style="vertical-align:middle; margin-left:6px;">
    </span>
</div>

<div class="timer-row">
    <span>AUTO-RUN IN</span>
    <span id="countdown">2.0</span><span>s</span>
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
</div>

<div class="split">
    <div class="panel">
        <div class="panel-header">
            <span>_AutofillExtensions</span>
            <span class="entry-count" id="ae-count">0 entries</span>
        </div>
        <div class="log-box" id="ae-log"></div>
        <div class="methods-box" id="ae-methods" style="display:none">
            <div class="methods-label">▸ call a method</div>
            <div id="ae-btns"></div>
        </div>
    </div>
    <div class="panel">
        <div class="panel-header">
            <span>window.android</span>
            <span class="entry-count" id="an-count">0 entries</span>
        </div>
        <div class="log-box" id="an-log"></div>
        <div class="methods-box" id="an-methods" style="display:none">
            <div class="methods-label">▸ call a method</div>
            <div id="an-btns"></div>
        </div>
    </div>
</div>

<div class="panel full-panel">
    <div class="panel-header">
        <span>COMBINED LOG</span>
        <span class="entry-count" id="all-count">0 entries</span>
    </div>
    <div class="log-box" id="all-log"></div>
</div>

<script>
    let maxDepth = 2;
    let hasRun = false; // ← duplicate-run guard

    function appendLine(boxId, counterId, text, cls) {
        const box = document.getElementById(boxId);
        const div = document.createElement('div');
        div.className = 'log-line ' + (cls || '');
        const icons = { fn: '⚙', res: '↳', prop: '·', info: '▸', err: '✕', none: '—', call: '◆' };
        div.innerHTML = `<span class="prefix">${icons[cls] || '·'} </span>${escHtml(text)}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        const cnt = document.getElementById(counterId);
        const cur = parseInt(cnt.textContent) + 1;
        cnt.textContent = cur + ' entr' + (cur === 1 ? 'y' : 'ies');
    }

    function log(text, cls, target) {
        if (target === 'ae') appendLine('ae-log', 'ae-count', text, cls);
        else if (target === 'an') appendLine('an-log', 'an-count', text, cls);
        appendLine('all-log', 'all-count', text, cls);
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Collect top-level function names for interactive buttons
    function collectMethods(obj) {
        if (!obj) return [];
        try {
            return Object.getOwnPropertyNames(obj).filter(p => {
                try { return typeof obj[p] === 'function'; } catch(e) { return false; }
            });
        } catch(e) { return []; }
    }

    function buildMethodButtons(obj, methods, btnContainerId, logTarget) {
        const container = document.getElementById(btnContainerId);
        container.innerHTML = '';
        methods.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'method-btn';
            btn.textContent = name + '()';
            btn.onclick = () => callMethod(obj, name, logTarget);
            container.appendChild(btn);
        });
    }

    function callMethod(obj, name, target) {
        log('Calling ' + name + '() manually...', 'call', target);
        try {
            const result = obj[name].apply(obj);
            if (result && typeof result.then === 'function') {
                result
                    .then(r => log('→ ' + name + '() resolved: ' + JSON.stringify(r), 'res', target))
                    .catch(e => log('→ ' + name + '() rejected: ' + e.message, 'err', target));
                log('→ ' + name + '() returned a Promise (waiting...)', 'res', target);
            } else {
                log('→ ' + name + '() = ' + JSON.stringify(result), 'res', target);
            }
        } catch(e) {
            log('→ ' + name + '() threw: ' + e.message, 'err', target);
        }
    }

    function deepDump(obj, name, depth, target) {
        if (depth > maxDepth) return;
        if (obj === null || obj === undefined) return;
        let props;
        try { props = Object.getOwnPropertyNames(obj); } catch(e) { return; }
        props.forEach(prop => {
            try {
                let val = obj[prop];
                if (typeof val === 'function') {
                    log("fn: " + name + "." + prop + "()", 'fn', target);
                    if (prop.startsWith('get') || prop.startsWith('is')) {
                        try {
                            let res = val.apply(obj);
                            log("→ " + prop + "() = " + JSON.stringify(res), 'res', target);
                        } catch(e) {
                            log("→ " + prop + "() threw: " + e.message, 'err', target);
                        }
                    }
                } else if (typeof val === 'object' && val !== null) {
                    log("obj: " + name + "." + prop + " {}", 'prop', target);
                    deepDump(val, name + "." + prop, depth + 1, target);
                } else {
                    log("val: " + name + "." + prop + " = " + JSON.stringify(val), 'prop', target);
                }
            } catch(e) {}
        });
    }

    function setStatus(s) {
        const b = document.getElementById('status-badge');
        b.className = 'badge badge-' + s;
        b.textContent = s.toUpperCase();
    }

    function clearAll() {
        ['ae-log','an-log','all-log'].forEach(id => document.getElementById(id).innerHTML = '');
        ['ae-count','an-count','all-count'].forEach(id => document.getElementById(id).textContent = '0 entries');
        ['ae-methods','an-methods'].forEach(id => document.getElementById(id).style.display = 'none');
        hasRun = false;
        setStatus('idle');
    }

    function copyResults() {
        const lines = [...document.querySelectorAll('#all-log .log-line')]
            .map(el => el.textContent.trim()).join('\n');
        navigator.clipboard.writeText(lines).then(() => {
            const btn = [...document.querySelectorAll('button')].find(b => b.textContent.includes('COPY'));
            const orig = btn.textContent;
            btn.textContent = '✓ COPIED';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }

    function runDump() {
        if (hasRun) return; // ← prevent double execution
        hasRun = true;
        setStatus('run');

        const ae = window._AutofillExtensions;
        if (ae != null) {
            log('Inspecting window._AutofillExtensions...', 'info', 'ae');
            deepDump(ae, '_AutofillExtensions', 0, 'ae');
            const methods = collectMethods(ae);
            if (methods.length) {
                buildMethodButtons(ae, methods, 'ae-btns', 'ae');
                document.getElementById('ae-methods').style.display = 'block';
            }
        } else {
            log('window._AutofillExtensions is not defined', 'none', 'ae');
        }

        const an = window.android;
        if (an != null) {
            log('Inspecting window.android...', 'info', 'an');
            deepDump(an, 'android', 0, 'an');
            const methods = collectMethods(an);
            if (methods.length) {
                buildMethodButtons(an, methods, 'an-btns', 'an');
                document.getElementById('an-methods').style.display = 'block';
            }
        } else {
            log('window.android is not defined', 'none', 'an');
        }

        setStatus('done');
    }

    // Countdown + single auto-run
    const DELAY = 2000;
    const start = Date.now();
    const tick = setInterval(() => {
        const elapsed = Date.now() - start;
        const remaining = Math.max(0, DELAY - elapsed);
        document.getElementById('countdown').textContent = (remaining / 1000).toFixed(1);
        document.getElementById('prog').style.width = ((elapsed / DELAY) * 100) + '%';
        if (elapsed >= DELAY) clearInterval(tick);
    }, 50);

    setTimeout(runDump, DELAY);
</script>
</body>
</html>
