<!DOCTYPE html>
<html>
<body>
    <h1>MojoJS Command Buffer Injector</h1>

    <!-- 1. POLYFILL SCRIPT: Fix the Chrome v149 version mismatch -->
    <script>
        // Force the Mojo internal object to exist if it doesn't
        window.mojo = window.mojo || {};
        mojo.internal = mojo.internal || {};
        
        // Fake the Enum function that the older mojom.js file is looking for
        if (!mojo.internal.Enum) {
            console.log("[*] Polyfilling mojo.internal.Enum for older bindings...");
            mojo.internal.Enum = function() { return {}; };
        }
        
        // Sometimes it also complains about Struct, so let's safeguard that too
        if (!mojo.internal.Struct) {
            mojo.internal.Struct = function() { return {}; };
        }
    </script>

    <!-- 2. EXPLOIT SCRIPT -->
    <script type="module">
        // Now when this file loads, it will use our faked Enum function instead of crashing!
        import * as gpuChannelModule from './gpu_channel.mojom.js';
        
        console.log("[*] Successfully imported GPU Channel Module:", gpuChannelModule);

        // Print exactly what the module exported so we can find the right proxy name
        for (let key in gpuChannelModule) {
            console.log("Exported: " + key);
        }
    </script>
</body>
</html>
