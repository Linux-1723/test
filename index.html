                try { bridge("initializeCallbackHandler", uuid, deepArray); } catch(e) {}

                // Provide 100 arguments to a function expecting 3. 
                // Can overwrite adjacent stack frames in poorly written JNI bindings.
                let args = new Array(100).fill(0x41414141);
                try { bridge.apply(this, args); } catch(e) {}
