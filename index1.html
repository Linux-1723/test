<!DOCTYPE html>
<html>
<head>
    <title>MojoJS Setup</title>
</head>
<body>
    <h1>MojoJS ES6 Module Loader4</h1>
    
    <!-- Use an import map so the browser knows where to find the Mojo files -->
    <script type="importmap">
        {
            "imports": {
                "mojo_bindings": "gen/mojo/public/js/bindings.js",
                "gpu_channel": "gen/gpu/ipc/common/gpu_channel.mojom.js"
            }
        }
    </script>

    <!-- MUST be type="module" -->
    <script type="module">
        import { Mojo } from 'bindings';
        
        // This will now successfully log the Mojo object without 'export' syntax errors!
        console.log("Mojo API loaded successfully: ", Mojo);
        
        // Next step: we have to request viz.mojom.GpuService here to build 
        // the Command Buffer manually.
    </script>
</body>
</html>
